<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard — Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#1a0000,#000);
  color:white;
}

/* HEADER */
header{
  background:#8b0000;
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

header span{
  color:#1da1f2;
}

/* USER INFO */
#userInfo{
  text-align:center;
  margin:15px;
  font-size:14px;
  color:#00ff7f;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
  max-width:420px;
  margin:auto;
}

/* CARD */
.card{
  background:#111;
  border:1px solid #ff0000;
  border-radius:15px;
  padding:20px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  background:#8b0000;
}

.card span{
  font-size:28px;
  display:block;
  margin-bottom:10px;
}

/* LOGOUT */
#logout{
  margin:20px auto;
  display:block;
  background:#ff0000;
  border:none;
  color:white;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<script>
// 🔐 PROTECTION
const user = localStorage.getItem("currentUser");
const gender = localStorage.getItem("gender");

if(!user){
  window.location.href="connexion.html";
}
</script>

<header>
  Anonymous SOS FR <span>✔</span>
</header>

<div id="userInfo">
  Connecté : <b id="userName"></b> (<span id="userGender"></span>)
</div>

<div class="grid">

  <div class="card" onclick="go('feed.html')">
    <span>🎬</span>
    Feed
  </div>

  <div class="card" onclick="go('lives.html')">
    <span>🔴</span>
    Live
  </div>

  <div class="card" onclick="go('live-search.html')">
    <span>🔍</span>
    Rechercher un live
  </div>

  <div class="card" onclick="go('battle.html')">
    <span>⚔️</span>
    Battles
  </div>

  <div class="card" onclick="go('gifts.html')">
    <span>🎁</span>
    Cadeaux
  </div>

  <div class="card" onclick="go('classement.html')">
    <span>🏆</span>
    Classements
  </div>

  <div class="card" onclick="go('ads.html')">
    <span>💰</span>
    Pubs
  </div>

  <div class="card" onclick="go('profil.html')">
    <span>👤</span>
    Profil
  </div>

</div>

<button id="logout" onclick="logout()">Déconnexion</button>

<script>
document.getElementById("userName").innerText = user;
document.getElementById("userGender").innerText = gender;

function go(page){
  window.location.href = page;
}

function logout(){
  localStorage.removeItem("currentUser");
  localStorage.removeItem("gender");
  window.location.href="index.html";
}
</script>

</body>
</html>

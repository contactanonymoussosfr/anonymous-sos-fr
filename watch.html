<!DOCTYPE html>
<html lang="fr">

<title>Film</title>

<body>

<h1 style="padding:20px;">🎬 Lecture du film</h1>

<div class="languages">
  <button onclick="setLang('fr')">🇫🇷 Français</button>
  <button onclick="setLang('en')">🇬🇧 English</button>
</div>

<div id="player" style="text-align:center;"></div>

<div class="film-warning">
🔞 Film réservé aux majeurs (18+).  
En continuant, vous confirmez être majeur.
</div>

<script>
const films={
  nosferatu:{fr:"https://www.youtube.com/embed/FR_ID",en:"https://www.youtube.com/embed/EN_ID"},
  night:{fr:"https://www.youtube.com/embed/FR_ID",en:"https://www.youtube.com/embed/EN_ID"},
  thekid:{fr:"https://www.youtube.com/embed/FR_ID",en:"https://www.youtube.com/embed/EN_ID"},
  gertie:{fr:"https://www.youtube.com/embed/FR_ID",en:"https://www.youtube.com/embed/EN_ID"}
};

const id=new URLSearchParams(location.search).get("id");
function setLang(l){
  document.getElementById("player").innerHTML=
  <iframe width="90%" height="500" src="${films[id][l]}" allowfullscreen></iframe>;
}
setLang("fr");
</script>

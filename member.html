<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR — Espace membre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  color:#aaffaa;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* MATRIX BACKGROUND */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* CONTENT */
.container{
  position:relative;
  z-index:1;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:380px;
  background:#0a0f0aee;
  border:1px solid #00ff66;
  box-shadow:0 0 35px #00ff66;
  border-radius:16px;
  padding:30px;
  text-align:center;
}

h1{
  color:#00ff66;
  margin-bottom:10px;
  text-shadow:0 0 12px #00ff66;
}

p{
  font-size:14px;
  margin-bottom:20px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  background:#ff4444;
  color:white;
}

footer{
  margin-top:15px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <div class="card">
    <h1>Espace Membre</h1>
    <p>Connexion sécurisée active.<br>Bienvenue sur Anonymous SOS FR.</p>
    <button onclick="logout()">Se déconnecter</button>
    <footer>© Anonymous SOS FR — Tous droits réservés</footer>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.appspot.com",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:ac31fc1073d9f858b2a02c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, user => {
  if(!user){
    window.location.href = "index.html";
  }
});

window.logout = () => {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};
</script>

<!-- MATRIX EFFECT -->
<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array.from({length: columns}).fill(1);

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#00ff66";
  ctx.font = fontSize + "px monospace";

  drops.forEach((y,i)=>{
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, y*fontSize);
    if(y*fontSize > canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  });
}
setInterval(draw, 33);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:black;
  color:#aaffea;
  height:100vh;
  overflow:hidden;
}

/* MATRIX BACKGROUND */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* CENTER CARD */
.container{
  position:relative;
  z-index:1;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:360px;
  background:rgba(0,0,0,0.75);
  border:2px solid #00ff66;
  border-radius:16px;
  padding:24px;
  box-shadow:0 0 30px #00ff66;
  text-align:center;
}

h1{
  color:#00ff66;
  margin-bottom:10px;
  text-shadow:0 0 12px #00ff66;
}

p{
  font-size:13px;
  margin-bottom:14px;
  line-height:1.5;
}

ul{
  text-align:left;
  font-size:13px;
  margin-bottom:14px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:none;
  outline:none;
  background:#eee;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.btn-create{
  background:#1976ff;
  color:white;
}

.btn-login{
  background:#00c853;
  color:black;
}

#status{
  margin-top:10px;
  font-size:13px;
  min-height:18px;
}

footer{
  margin-top:12px;
  font-size:11px;
  opacity:0.7;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <div class="card">
    <h1>Anonymous SOS FR</h1>
    <p>Plateforme communautaire indépendante et sécurisée</p>
    <ul>
      <li>Anonymat respecté</li>
      <li>Aucune haine, aucune violence</li>
      <li>Responsabilité individuelle</li>
      <li>Projet non officiel Anonymous</li>
    </ul>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">

    <button class="btn-create" onclick="register()">Créer un compte</button>
    <button class="btn-login" onclick="login()">Se connecter</button>

    <div id="status"></div>

    <footer>© Anonymous SOS FR — Tous droits réservés</footer>
  </div>
</div>

<!-- MATRIX SCRIPT -->
<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array.from({length: columns}).fill(1);

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#00ff66";
  ctx.font = fontSize + "px monospace";

  drops.forEach((y,i)=>{
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, y*fontSize);
    if(y*fontSize > canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  });
}
setInterval(draw,33);
</script>

<!-- FIREBASE AUTH -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.firebasestorage.app",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:ac31fc1073d9f858b2a02c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const status = document.getElementById("status");

window.register = () => {
  status.textContent = "Création du compte...";
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => {
      window.location.href = "member.html";
    })
    .catch(e => status.textContent = e.message);
};

window.login = () => {
  status.textContent = "Connexion...";
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => {
      window.location.href = "member.html";
    })
    .catch(() => status.textContent = "Identifiants invalides");
};
</script>

</body>
</html>

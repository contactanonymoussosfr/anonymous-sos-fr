<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR — Espace Membre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, Arial, sans-serif;
}

body{
  background:black;
  color:#aaffaa;
  height:100vh;
  overflow:hidden;
}

/* MATRIX BACKGROUND */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* CONTENT */
.container{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:420px;
  background:rgba(0,0,0,0.85);
  border-radius:16px;
  padding:30px;
  text-align:center;
  box-shadow:0 0 40px #00ff66;
  border:1px solid #00ff66;
}

h1{
  color:#00ff66;
  margin-bottom:10px;
  text-shadow:0 0 12px #00ff66;
}

p{
  font-size:14px;
  margin-bottom:15px;
}

.info{
  background:rgba(0,255,100,0.1);
  padding:10px;
  border-radius:8px;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.logout{
  background:#ff4444;
  color:white;
}

.logout:hover{
  background:#ff2222;
}

footer{
  margin-top:15px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <div class="card">
    <h1>Anonymous SOS FR</h1>
    <p>Espace membre sécurisé</p>

    <div class="info">
      ✔ Connexion validée<br>
      ✔ Accès autorisé
    </div>

    <p>
      Ici seront ajoutés :
      <br>• salons
      <br>• messages
      <br>• radio / live
      <br>• rôles (admin / membre)
    </p>

    <button class="logout" onclick="logout()">Se déconnecter</button>

    <footer>
      © Anonymous SOS FR — Tous droits réservés
    </footer>
  </div>
</div>

<!-- MATRIX SCRIPT -->
<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01ANONYMOUSSOSFR";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for(let i=0;i<columns;i++) drops[i]=1;

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#00ff66";
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    const text = letters.charAt(Math.floor(Math.random()*letters.length));
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);
    if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
      drops[i]=0;
    }
    drops[i]++;
  }
}

setInterval(draw,33);

/* LOGOUT */
function logout(){
  window.location.href="index.html";
}
</script>

</body>
</html>

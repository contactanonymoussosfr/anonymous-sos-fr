<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Anonymous SOS FR — Espace Membre</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:black;
      color:#aaffea;
      height:100vh;
      overflow:hidden;
    }

    /* MATRIX BACKGROUND */
    canvas{
      position:fixed;
      inset:0;
      z-index:0;
    }

    /* CENTER */
    .overlay{
      position:relative;
      z-index:1;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .card{
      width:360px;
      background:#0a0f0aee;
      border-radius:14px;
      padding:26px;
      text-align:center;
      border:1px solid #00ff66;
      box-shadow:0 0 40px #00ff66;
    }

    h1{
      color:#00ff66;
      margin-bottom:10px;
      text-shadow:0 0 12px #00ff66;
    }

    p{
      font-size:13px;
      margin-bottom:10px;
      line-height:1.5;
    }

    .role{
      font-weight:bold;
      margin-bottom:14px;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:8px;
      border:none;
      border-radius:6px;
      font-weight:bold;
      cursor:pointer;
    }

    .logout{
      background:#ff4444;
      color:white;
    }

    #adminBtn{
      display:none;
      background:#ff4444;
      color:white;
    }

    footer{
      margin-top:12px;
      font-size:11px;
      opacity:.6;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="overlay">
  <div class="card">
    <h1>Espace Membre</h1>

    <p>Bienvenue sur <strong>Anonymous SOS FR</strong></p>

    <p>Connecté en tant que :</p>
    <p id="email"></p>
    <p class="role" id="role"></p>

    <button id="adminBtn">🔴 Espace Admin</button>
    <button class="logout" onclick="logout()">Se déconnecter</button>

    <footer>© Anonymous SOS FR — Espace sécurisé</footer>
  </div>
</div>

<script type="module">
/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.firebasestorage.app",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:ac31fc1073d9f858b2a02c",
  measurementId: "G-N6WV4GNQX3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* AUTH CHECK */
onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  document.getElementById("email").textContent = user.email;

  const role = document.getElementById("role");
  const adminBtn = document.getElementById("adminBtn");

  if (user.email === "despeschez@gmail.com") {
    role.textContent = "🔴 ADMINISTRATEUR";
    role.style.color = "#ff4444";
    adminBtn.style.display = "block";
    adminBtn.onclick = () => window.location.href = "admin.html";
  } else {
    role.textContent = "🟢 MEMBRE";
  }
});

/* LOGOUT */
window.logout = function(){
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
}

/* MATRIX EFFECT */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array.from({length: columns}).fill(1);

function drawMatrix(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff66";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }
    drops[i]++;
  }
}

setInterval(drawMatrix, 33);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Espace Membre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  background: black;
  color: #00ff00;
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 100px;
}

button {
  margin-top: 30px;
  padding: 12px 20px;
  background: darkred;
  color: white;
  border: none;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Espace Membre</h1>
<h2 id="welcome"></h2>

<button onclick="logout()">Se déconnecter</button>

<script>
  const id = localStorage.getItem("anonymous_id");

  if (!id) {
    window.location.href = "index.html";
  }

  document.getElementById("welcome").innerText =
    "Bienvenue " + id;

  function logout() {
    localStorage.removeItem("anonymous_id");
    window.location.href = "index.html";
  }
</script>

</body>
</html>

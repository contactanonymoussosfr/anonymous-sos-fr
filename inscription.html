<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Créer un compte</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="form-box">
<h2>Créer un compte</h2>

<input id="name" placeholder="Prénom">
<input id="birth" type="date">
<select id="gender">
  <option value="">Sexe</option>
  <option>Homme</option>
  <option>Femme</option>
</select>

<button onclick="register()">Créer</button>
</div>

<script>
function register(){
  const user={
    name: name.value,
    birth: birth.value,
    gender: gender.value
  };
  localStorage.setItem("user", JSON.stringify(user));
  location.href="index.html";
}
</script>

</body>
</html>

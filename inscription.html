<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription – Anonymous SOS FR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0b0b0b;
      color: #ffffff;
      margin: 0;
      padding: 0;
    }

    header {
      background: #111;
      padding: 25px;
      text-align: center;
      border-bottom: 3px solid red;
    }

    header h1 {
      color: red;
      margin: 0;
    }

    section {
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background: #151515;
      border-radius: 8px;
    }

    label {
      display: block;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: red;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: darkred;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>
  <h1>Inscription</h1>
  <p>Anonymous SOS FR</p>
</header>

<section>
  <form>
    <label>Nom d’utilisateur</label>
    <input type="text" placeholder="Pseudo" required>

    <label>Email</label>
    <input type="email" placeholder="email@example.com" required>

    <label>Mot de passe</label>
    <input type="password" placeholder="Mot de passe" required>

    <label>Confirmer le mot de passe</label>
    <input type="password" placeholder="Confirmation" required>

    <button type="submit">Créer mon compte</button>
  </form>
</section>

<footer>
  © Anonymous SOS FR – Tous droits réservés

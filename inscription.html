<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription – Anonymous SOS FR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      margin: 60px auto;
      background: #111;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(255,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #ff3b3b;
    }

    label {
      display: block;
      margin-top: 15px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 5px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .checkbox {
      margin-top: 15px;
      font-size: 13px;
    }

    .checkbox input {
      width: auto;
      margin-right: 6px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #ff3b3b;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ff0000;
    }

    .note {
      font-size: 12px;
      color: #aaa;
      margin-top: 15px;
      text-align: center;
    }

    a {
      color: #ff3b3b;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>📝 Inscription</h1>

    <form>
      <label>Pseudo *</label>
      <input type="text" placeholder="Ton pseudo" required>

      <label>Adresse e-mail *</label>
      <input type="email" placeholder="exemple@email.com" required>

      <label>Date de naissance *</label>
      <input type="date" required>

      <div class="checkbox">
        <label>
          <input type="checkbox" required>
          Je confirme avoir *18 ans ou plus*
        </label>
      </div>

      <div class="checkbox">
        <label>
          <input type="checkbox" required>
          J’accepte les règles et conditions du site
        </label>
      </div>

      <button type="submit">Créer mon compte</button>
    </form>

    <div class="note">
      🔒 Inscription sécurisée<br>
      Les lives nécessitent une vérification d’identité.
      <br><br>
      <a href="index.html">← Retour à l’accueil</a>
    </div>
  </div>

</body>
</html>

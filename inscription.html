<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscription</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background:#0a0a0a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box {
  background:#111;
  padding:30px;
  border-radius:12px;
  border:1px solid red;
}
input, button {
  width:100%;
  margin-top:10px;
  padding:10px;
}
button {
  background:red;
  border:none;
  color:white;
}
</style>
</head>

<body>

<div class="box">
  <h2>Créer un compte</h2>
  <input id="email" placeholder="Email">
  <input id="id" placeholder="ID (pseudo)">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="register()">Créer</button>
</div>

<script>
function register() {
  const user = {
    email: email.value,
    id: id.value,
    password: password.value
  };

  localStorage.setItem("user_" + user.email, JSON.stringify(user));
  alert("Compte créé");
  location.href = "connexion.html";
}
</script>

</body>
</html>

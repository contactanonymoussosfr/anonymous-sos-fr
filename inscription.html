<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion — Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #eaeaea;
}

header {
    text-align: center;
    padding: 30px 20px;
    border-bottom: 3px solid red;
}

header h1 {
    color: red;
    margin: 0;
    font-size: 32px;
}

header p {
    margin-top: 10px;
    color: #ccc;
    font-size: 14px;
}

.container {
    max-width: 420px;
    margin: 60px auto;
    background: #141414;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 0 20px rgba(255,0,0,0.25);
}

.container h2 {
    text-align: center;
    color: red;
    margin-bottom: 10px;
}

.container p {
    text-align: center;
    font-size: 13px;
    color: #aaa;
    margin-bottom: 25px;
}

label {
    display: block;
    margin-bottom: 5px;
    margin-top: 15px;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 5px;
    border: none;
    outline: none;
    background: #222;
    color: white;
    font-size: 14px;
}

button {
    width: 100%;
    margin-top: 25px;
    padding: 14px;
    background: red;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #cc0000;
}

.notice {
    margin-top: 15px;
    text-align: center;
    font-size: 12px;
    color: #888;
}

.links {
    margin-top: 25px;
    text-align: center;
}

.links a {
    display: block;
    color: red;
    text-decoration: none;
    margin-top: 10px;
    font-size: 14px;
}

footer {
    text-align: center;
    margin-top: 40px;
    font-size: 13px;
    color: #777;
}
</style>
</head>

<body>

<header>
    <h1>🔐 Connexion</h1>
    <p>Anonymous SOS FR — Accès sécurisé</p>
</header>

<div class="container">
    <h2>Connexion au compte</h2>
    <p>Entrez vos identifiants pour accéder à la plateforme</p>

    <form>
        <label>Pseudo ou adresse e-mail</label>
        <input type="text" placeholder="Pseudo ou email" required>

        <label>Mot de passe</label>
        <input type="password" placeholder="Mot de passe" required>

        <button type="submit">Se connecter</button>
    </form>

    <div class="notice">
        ⚠️ Connexion visuelle uniquement pour le moment.<br>
        Le système sera activé ultérieurement.
    </div>

    <div class="links">
        <a href="inscription.html">✍️ Créer un compte</a>
        <a href="index.html">⬅ Retour à l’accueil</a>
    </div>
</div>

<footer>
    © Anonymous SOS FR — Tous droits réservés
</footer>

</body>
</html>

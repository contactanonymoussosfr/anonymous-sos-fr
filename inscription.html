<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscription</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:#111;
  padding:30px;
  border-radius:10px;
  width:320px;
}
input,button{
  width:100%;
  padding:10px;
  margin:8px 0;
}
button{
  background:red;
  color:white;
  border:none;
  cursor:pointer;
}
#msg{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Inscription</h2>

  <form id="registerForm">
    <input type="email" id="email" placeholder="Adresse email" required>
    <input type="password" id="password" placeholder="Mot de passe" required>
    <button type="submit">Créer le compte</button>
  </form>

  <div id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TA_VRAIE_CLE_API",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function generatePublicId(){
  return "ASFR-" + Math.random().toString(36).substring(2,8).toUpperCase();
}

document.getElementById("registerForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const email = email.value;
  const password = password.value;

  try{
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    const publicId = generatePublicId();

    await setDoc(doc(db,"users",cred.user.uid),{
      publicId: publicId,
      email: email,
      createdAt: serverTimestamp()
    });

    msg.innerHTML = `
      Compte créé avec succès.<br><br>
      Ton ID : <b>${publicId}</b><br>
      Note-le soigneusement.
    `;

  }catch(err){
    msg.innerText = err.message;
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Contact – Anonymous SOS FR</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>📩 Nous contacter</h1>

<p>
Si vous avez une question, un souci ou une demande,
vous pouvez nous contacter via WhatsApp ou par message ci-dessous.
</p>

<div class="contact-box">
  <input type="text" placeholder="Votre nom">
  <input type="email" placeholder="Votre e-mail">
  <textarea placeholder="Votre message"></textarea>
  <button onclick="sendMessage()">Envoyer le message</button>
</div>

<p id="contact-info"></p>

<script>
function sendMessage() {
  document.getElementById("contact-info").innerText =
    "Merci pour votre message. Nous vous répondrons dès que possible.";
}
</script>

<!-- BOUTON SOS -->
<a
  href="https://wa.me/32456894335?text=Si%20probl%C3%A8me%20-%20Contact%20service%20Anonymous%20SOS%20FR"
  class="sos-whatsapp"
  target="_blank">
  🆘 Si problème, contacter le service
</a>

</body>
</html>

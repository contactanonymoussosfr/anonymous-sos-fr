<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cadeaux – Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#3b0000,#0b0000);
  color:#fff;
}

header{
  background:#7a0000;
  padding:15px;
  text-align:center;
}

.container{
  max-width:1100px;
  margin:30px auto;
  padding:20px;
}

h1{text-align:center;}
.subtitle{text-align:center;color:#ccc;margin-bottom:30px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  border:1px solid #ff3333;
  border-radius:10px;
  padding:20px;
  background:rgba(0,0,0,0.45);
  text-align:center;
}

.icon{font-size:42px;}
.card h3{margin:10px 0;}
.card p{font-size:14px;color:#ccc;}

.card button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:6px;
  background:#ff3333;
  color:#fff;
  cursor:pointer;
}

.card button:disabled{
  background:#444;
  cursor:not-allowed;
}

.balance{
  margin-top:30px;
  text-align:center;
  font-size:18px;
}

.effect{
  margin-top:20px;
  text-align:center;
  font-size:22px;
  color:#00e676;
}
</style>
</head>

<body>

<script>
// 🔐 COMPTE OBLIGATOIRE
const currentUser = localStorage.getItem("currentUser");
if(!currentUser){
  window.location.href="login.html";
}
</script>

<header>
  <h2>🎁 Cadeaux</h2>
</header>

<div class="container">

<h1>Envoyer des cadeaux</h1>
<p class="subtitle">Les cadeaux changent automatiquement selon les fêtes 🎉</p>

<div class="grid" id="giftsGrid"></div>

<div class="balance">
  💰 Tes crédits : <b id="credits">0</b>
</div>

<div class="effect" id="effect"></div>

</div>

<script>
// 📊 UTILISATEUR
let userData = JSON.parse(localStorage.getItem("user_" + currentUser));
let credits = userData.credits || 0;
document.getElementById("credits").innerText = credits;

// 🎁 CADEAUX PERMANENTS
const permanentGifts = [
  {icon:"❤️", name:"Cœur", cost:10, points:1},
  {icon:"🌹", name:"Rose", cost:50, points:5},
  {icon:"🔥", name:"Flamme", cost:100, points:10},
  {icon:"🦁", name:"Lion", cost:5000, points:100}
];

// 🎉 CADEAUX SAISONNIERS (AUTO)
const seasonalGifts = [];
const today = new Date();
const day = today.getDate();
const month = today.getMonth() + 1;

// ❤️ Saint-Valentin (1–14 février)
if(month === 2 && day <= 14){
  seasonalGifts.push(
    {icon:"💘", name:"Cœur Amour", cost:150, points:15},
    {icon:"💍", name:"Bague", cost:500, points:40}
  );
}

// 👩 Fête des mères (mai)
if(month === 5){
  seasonalGifts.push(
    {icon:"🌸", name:"Fleur Maman", cost:200, points:20},
    {icon:"💐", name:"Bouquet", cost:600, points:50}
  );
}

// 🎄 Noël (décembre)
if(month === 12){
  seasonalGifts.push(
    {icon:"🎁", name:"Cadeau Noël", cost:300, points:25},
    {icon:"🎅", name:"Père Noël", cost:1000, points:80}
  );
}

// 🐣 Pâques (mars–avril)
if(month === 3 || month === 4){
  seasonalGifts.push(
    {icon:"🥚", name:"Œuf", cost:120, points:10},
    {icon:"🐰", name:"Lapin", cost:400, points:30}
  );
}

// 📦 AFFICHAGE DES CADEAUX
const allGifts = [...permanentGifts, ...seasonalGifts];
const grid = document.getElementById("giftsGrid");

allGifts.forEach(gift=>{
  const div = document.createElement("div");
  div.className="card";
  div.innerHTML = `
    <div class="icon">${gift.icon}</div>
    <h3>${gift.name}</h3>
    <p>${gift.cost} crédits • +${gift.points} points</p>
    <button onclick="sendGift(${gift.cost},${gift.points},'${gift.icon} ${gift.name}')">
      Envoyer
    </button>
  `;
  grid.appendChild(div);
});

// 🎁 ENVOI CADEAU
function sendGift(cost, points, label){
  if(credits < cost){
    alert("Crédits insuffisants.");
    return;
  }

  credits -= cost;
  userData.credits = credits;
  userData.points += points;

  localStorage.setItem("user_" + currentUser, JSON.stringify(userData));
  localStorage.setItem("points_" + currentUser, userData.points);

  document.getElementById("credits").innerText = credits;
  document.getElementById("effect").innerText =
    "✨ Cadeau envoyé : " + label;

  setTimeout(()=>{
    document.getElementById("effect").innerText="";
  },3000);
}
</script>

</body>
</html>

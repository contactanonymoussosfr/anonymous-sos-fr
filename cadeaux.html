<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cadeaux – Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#3b0000,#0b0000);
  color:#fff;
}

header{
  background:#7a0000;
  padding:15px;
  text-align:center;
}

.container{
  max-width:1200px;
  margin:30px auto;
  padding:20px;
}

h1{text-align:center;}
.subtitle{text-align:center;color:#ccc;margin-bottom:30px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  border:1px solid #ff3333;
  border-radius:10px;
  padding:20px;
  background:rgba(0,0,0,0.45);
  text-align:center;
}

.icon{font-size:42px;}
.card h3{margin:10px 0;}
.card p{font-size:14px;color:#ccc;}

.card button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:6px;
  background:#ff3333;
  color:#fff;
  cursor:pointer;
}

.balance{
  margin-top:30px;
  text-align:center;
  font-size:18px;
}

.effect{
  margin-top:20px;
  text-align:center;
  font-size:22px;
  color:#00e676;
}
</style>
</head>

<body>

<script>
const currentUser = localStorage.getItem("currentUser");
if(!currentUser){
  window.location.href="login.html";
}
</script>

<header>
  <h2>🎁 Cadeaux</h2>
</header>

<div class="container">

<h1>Cadeaux à crédits</h1>
<p class="subtitle">Moins cher que TikTok • Plus accessible • Plus fun</p>

<div class="grid" id="giftsGrid"></div>

<div class="balance">
  💰 Tes crédits : <b id="credits">0</b>
</div>

<div class="effect" id="effect"></div>

</div>

<script>
let userData = JSON.parse(localStorage.getItem("user_" + currentUser));
let credits = userData.credits || 0;
document.getElementById("credits").innerText = credits;

// 🎁 CADEAUX PERMANENTS + PRESTIGE
const gifts = [
  {icon:"❤️", name:"Cœur", cost:10, points:1},
  {icon:"🌹", name:"Rose", cost:50, points:5},
  {icon:"🔥", name:"Flamme", cost:100, points:10},
  {icon:"🦁", name:"Lion Ultime", cost:3000, points:100},
  {icon:"👑", name:"Couronne Suprême", cost:8000, points:300},
  {icon:"🌌", name:"Univers SOS", cost:15000, points:600}
];

// 📦 AFFICHAGE
const grid = document.getElementById("giftsGrid");

gifts.forEach(gift=>{
  const div = document.createElement("div");
  div.className="card";
  div.innerHTML = `
    <div class="icon">${gift.icon}</div>
    <h3>${gift.name}</h3>
    <p>${gift.cost} crédits • +${gift.points} points</p>
    <button onclick="sendGift(${gift.cost},${gift.points},'${gift.icon} ${gift.name}')">
      Envoyer
    </button>
  `;
  grid.appendChild(div);
});

function sendGift(cost, points, label){
  if(credits < cost){
    alert("Crédits insuffisants.");
    return;
  }

  credits -= cost;
  userData.credits = credits;
  userData.points += points;

  localStorage.setItem("user_" + currentUser, JSON.stringify(userData));
  localStorage.setItem("points_" + currentUser, userData.points);

  document.getElementById("credits").innerText = credits;
  document.getElementById("effect").innerText =
    "✨ Cadeau envoyé : " + label;

  setTimeout(()=>{
    document.getElementById("effect").innerText="";
  },3000);
}
</script>

</body>
</html>

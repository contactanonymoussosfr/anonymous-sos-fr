<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cadeaux – Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#2a0000,#050000);
  color:#fff;
}
header{background:#7a0000;padding:15px;text-align:center;}
.container{max-width:1300px;margin:30px auto;padding:20px;}
h1{text-align:center;}
.subtitle{text-align:center;color:#ccc;margin-bottom:30px;}

.section{
  margin-top:45px;
}
.section h2{
  text-align:center;
  color:#ff7777;
  margin-bottom:15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  border:1px solid #ff3333;
  border-radius:14px;
  padding:20px;
  background:rgba(0,0,0,0.5);
  text-align:center;
}

.icon{font-size:44px;}
.card h3{margin:10px 0;}
.card p{font-size:14px;color:#ccc;}

.card button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  background:#ff3333;
  color:#fff;
  cursor:pointer;
}

.balance{
  margin-top:40px;
  text-align:center;
  font-size:18px;
}
.effect{
  margin-top:20px;
  text-align:center;
  font-size:22px;
  color:#00e676;
}
</style>
</head>

<body>

<script>
const currentUser = localStorage.getItem("currentUser");
if(!currentUser){ window.location.href="login.html"; }
</script>

<header>
  <h2>🎁 Cadeaux – Anonymous SOS FR</h2>
</header>

<div class="container">
<h1>Cadeaux à crédits</h1>
<p class="subtitle">Exclusifs • Féeriques • Prestige • Événements</p>

<div id="allSections"></div>

<div class="balance">💰 Tes crédits : <b id="credits">0</b></div>
<div class="effect" id="effect"></div>
</div>

<script>
let userData = JSON.parse(localStorage.getItem("user_" + currentUser));
let credits = userData.credits || 0;
document.getElementById("credits").innerText = credits;

function section(title, gifts){
  let html = <div class="section"><h2>${title}</h2><div class="grid">;
  gifts.forEach(g=>{
    html += `
    <div class="card">
      <div class="icon">${g.icon}</div>
      <h3>${g.name}</h3>
      <p>${g.cost} crédits • +${g.points} points</p>
      <button onclick="sendGift(${g.cost},${g.points},'${g.icon} ${g.name}')">
        Envoyer
      </button>
    </div>`;
  });
  html += "</div></div>";
  return html;
}

const sections = [
  {
    title:"Cadeaux standards & prestige",
    gifts:[
      {icon:"❤️",name:"Cœur",cost:10,points:1},
      {icon:"🌹",name:"Rose",cost:50,points:5},
      {icon:"🔥",name:"Flamme",cost:100,points:10},
      {icon:"🦁",name:"Lion Ultime",cost:3000,points:100},
      {icon:"👑",name:"Couronne Suprême",cost:8000,points:300},
      {icon:"🌌",name:"Univers SOS",cost:15000,points:600}
    ]
  },
  {
    title:"Cadeaux Anonymous exclusifs",
    gifts:[
      {icon:"🎭",name:"Masque Anonymous",cost:500,points:20},
      {icon:"👁️",name:"Œil Anonymous",cost:1000,points:40},
      {icon:"🛡️",name:"Bouclier SOS",cost:2000,points:70},
      {icon:"📡",name:"Signal Anonymous",cost:4000,points:120},
      {icon:"⚠️",name:"Ordre Anonymous",cost:7000,points:250},
      {icon:"🕶️",name:"Blackout",cost:12000,points:400}
    ]
  },
  {
    title:"🕶️ Cadeau ICONIQUE Anonymous",
    gifts:[
      {icon:"🕶️",name:"Anonymous – Jugement",cost:40000,points:1000}
    ]
  },
  {
    title:"🧚 Féerie & Contes",
    gifts:[
      {icon:"👠",name:"Soulier de verre",cost:300,points:20},
      {icon:"❄️",name:"Flocon Éternel",cost:500,points:30},
      {icon:"🧚",name:"Petite Fée",cost:400,points:25},
      {icon:"👑",name:"Cendrillon Royale",cost:10000,points:400},
      {icon:"👸",name:"Reine de Glace",cost:15000,points:600},
      {icon:"🌈",name:"Reine des Fées",cost:20000,points:800}
    ]
  },
  {
    title:"🐉 Dresseur & Créatures (Original)",
    gifts:[
      {icon:"🧢",name:"Maître des Créatures",cost:45000,points:1200}
    ]
  }
];

const container = document.getElementById("allSections");
sections.forEach(s=>{
  container.innerHTML += section(s.title,s.gifts);
});

function sendGift(cost,points,label){
  if(credits < cost){
    alert("Crédits insuffisants");
    return;
  }
  credits -= cost;
  userData.credits = credits;
  userData.points += points;
  localStorage.setItem("user_" + currentUser, JSON.stringify(userData));
  document.getElementById("credits").innerText = credits;
  document.getElementById("effect").innerText = "✨ Cadeau envoyé : " + label;
  setTimeout(()=>{document.getElementById("effect").innerText="";},3000);
}
</script>

</body>
</html>

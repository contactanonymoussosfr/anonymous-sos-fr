<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Modifier mon profil</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f0f0f;
  color:#fff;
}

nav{
  background:#140000;
  padding:15px;
}

nav a{
  color:#ff4a4a;
  text-decoration:none;
  font-weight:bold;
}

.container{
  max-width:600px;
  margin:30px auto;
  padding:20px;
}

input, textarea, button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#ff2a2a;
  font-weight:bold;
}
</style>
</head>

<body>

<nav>
  <a href="profil.html">⬅ Retour au profil</a>
</nav>

<div class="container">
  <h2>Modifier mon profil</h2>

  <input id="pseudo" placeholder="Pseudo public">
  <input id="photo" placeholder="Lien photo de profil">
  <textarea id="bio" placeholder="Bio"></textarea>
  <textarea id="videos"
    placeholder="Liens vidéos TikTok / YouTube (1 par ligne)">
  </textarea>

  <button onclick="save()">Enregistrer</button>
</div>

<script>
const p = JSON.parse(localStorage.getItem("profile")) || {};

pseudo.value = p.pseudo || "";
photo.value = p.photo || "";
bio.value = p.bio || "";
videos.value = (p.videos || []).join("\n");

function save(){
  const data = {
    pseudo: pseudo.value,
    photo: photo.value,
    bio: bio.value,
    videos: videos.value
      .split("\n")
      .map(v => v.trim())
      .filter(v => v !== "")
  };

  localStorage.setItem("profile", JSON.stringify(data));
  window.location.href = "profil.html";
}
</script>

</body>
</html>

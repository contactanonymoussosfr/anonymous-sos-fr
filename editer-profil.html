<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Profil – Simon City</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
}

header{
  background:#7a0000;
  padding:15px;
  text-align:center;
}

main{
  max-width:700px;
  margin:20px auto;
  padding:15px;
}

.profile-box{
  text-align:center;
  margin-bottom:20px;
}

.profile-box h2{
  margin:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.item{
  background:#111;
  border-radius:6px;
  overflow:hidden;
}

.item video,
.item img{
  width:100%;
  height:200px;
  object-fit:cover;
}
</style>
</head>

<body>

<script>
// 🔐 COMPTE OBLIGATOIRE
const currentUser = localStorage.getItem("currentUser");
if(!currentUser){
  window.location.href = "login.html";
}
</script>

<header>
  <h2>Profil utilisateur</h2>
</header>

<main>

<div class="profile-box">
  <h2 id="username"></h2>
</div>

<div class="grid" id="postsGrid"></div>

</main>

<script>
// 🔎 QUI ON AFFICHE ?
// par défaut = profil connecté
// possibilité plus tard d'ajouter ?id=XXX
const params = new URLSearchParams(window.location.search);
const profileId = params.get("id") || currentUser;

document.getElementById("username").innerText = "@" + profileId;

// 📦 RÉCUPÉRATION DES POSTS
let posts = JSON.parse(localStorage.getItem("posts")) || [];

// Filtrer les posts de cet utilisateur
posts = posts.filter(p => p.author === profileId);

// Plus récents en premier
posts.reverse();

const grid = document.getElementById("postsGrid");

if(posts.length === 0){
  grid.innerHTML = "<p style='opacity:.6'>Aucun contenu publié.</p>";
}

posts.forEach(post=>{
  const div = document.createElement("div");
  div.className = "item";

  if(post.type === "video"){
    div.innerHTML = <video controls src="${post.src}"></video>;
  }else{
    div.innerHTML = <img src="${post.src}">;
  }

  grid.appendChild(div);
});
</script>

</body>
</html>

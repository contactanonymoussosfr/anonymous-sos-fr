<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Panneau Admin</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: Arial;
      padding: 20px;
    }
    .user {
      border: 1px solid red;
      padding: 10px;
      margin-bottom: 10px;
    }
    select, button {
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h1>🔒 Panneau Administrateur</h1>
<div id="users"></div>

<script>
  // 🔥 CONFIG FIREBASE (reprends EXACTEMENT la tienne)
  const firebaseConfig = {
    apiKey: "TA_API_KEY",
    authDomain: "TON_AUTH_DOMAIN",
    projectId: "TON_PROJECT_ID"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  auth.onAuthStateChanged(async user => {
    if (!user) {
      document.body.innerHTML = "⛔ Accès refusé";
      return;
    }

    const me = await db.collection("users").doc(user.uid).get();

    if (!me.exists || me.data().role !== "admin") {
      document.body.innerHTML = "⛔ Accès réservé aux admins";
      return;
    }

    loadUsers();
  });

  function loadUsers() {
    db.collection("users").get().then(snapshot => {
      const container = document.getElementById("users");
      container.innerHTML = "";

      snapshot.forEach(doc => {
        const u = doc.data();

        const div = document.createElement("div");
        div.className = "user";

        div.innerHTML = `
          <strong>${u.username}</strong><br>
          Niveau : <input type="number" value="${u.level || 1}" id="lvl-${doc.id}"><br>
          Rôle :
          <select id="role-${doc.id}">
            <option value="user">user</option>
            <option value="moderator">moderator</option>
            <option value="admin">admin</option>
          </select><br>
          <button onclick="saveUser('${doc.id}')">💾 Sauvegarder</button>
        `;

        container.appendChild(div);

        document.getElementById(role-${doc.id}).value = u.role;
      });
    });
  }

  function saveUser(uid) {
    const level = Number(document.getElementById(lvl-${uid}).value);
    const role = document.getElementById(role-${uid}).value;

    db.collection("users").doc(uid).update({
      level,
      role
    }).then(() => {
      alert("✔ Modifié");
    });
  }
</script>

</body>
</html>

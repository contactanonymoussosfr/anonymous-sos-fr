<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin — Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: #0a0a0a;
  color: #fff;
  font-family: Arial, sans-serif;
  padding: 20px;
}
h1 {
  color: #ff2a2a;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}
th, td {
  border: 1px solid #ff2a2a;
  padding: 10px;
  text-align: center;
}
th {
  background: #1a1a1a;
}
.admin {
  color: #00ff9c;
  font-weight: bold;
}
.user {
  color: #fff;
}
.badge {
  color: #00bfff;
}
</style>
</head>

<body>

<h1>🛠 Panneau Admin — Anonymous SOS FR</h1>
<p id="status">Chargement...</p>

<table id="usersTable" style="display:none;">
  <thead>
    <tr>
      <th>ID</th>
      <th>Pseudo</th>
      <th>Niveau</th>
      <th>Badge</th>
      <th>Rôle</th>
    </tr>
  </thead>
  <tbody id="usersBody"></tbody>
</table>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TA_CLE_API",
  authDomain: "TON_PROJET.firebaseapp.com",
  projectId: "TON_PROJET",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const status = document.getElementById("status");
const table = document.getElementById("usersTable");
const body = document.getElementById("usersBody");

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    status.innerHTML = "❌ Non connecté";
    return;
  }

  const adminRef = doc(db, "users", user.uid);
  const adminSnap = await getDoc(adminRef);

  if (!adminSnap.exists() || adminSnap.data().role !== "admin") {
    status.innerHTML = "⛔ Accès refusé (admin uniquement)";
    return;
  }

  status.innerHTML = "✅ Admin connecté";
  table.style.display = "table";

  const querySnapshot = await getDocs(collection(db, "users"));
  body.innerHTML = "";

  querySnapshot.forEach((docSnap) => {
    const d = docSnap.data();
    body.innerHTML += `
      <tr>
        <td>${docSnap.id}</td>
        <td>${d.username || "—"}</td>
        <td>${d.level || 1}</td>
        <td class="badge">${d.badge || "débutant"}</td>
        <td class="${d.role === "admin" ? "admin" : "user"}">${d.role}</td>
      </tr>
    `;
  });
});
</script>

</body>
</html>

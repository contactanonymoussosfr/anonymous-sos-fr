<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Classement Crédits – Simon City</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0000;
  color:#fff;
}

header{
  background:#7a0000;
  padding:14px;
  text-align:center;
}

header h1{
  margin:0;
  font-size:22px;
}

header small{
  display:block;
  margin-top:4px;
  opacity:.85;
}

main{
  max-width:700px;
  margin:20px auto;
  padding:15px;
  background:#1a0000;
  border-radius:8px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ff3333;
  font-size:14px;
}

th{
  background:#2a0000;
}

.rank1{ color:gold; font-weight:bold; }
.rank2{ color:silver; font-weight:bold; }
.rank3{ color:#cd7f32; font-weight:bold; }

.me{
  background:#330000;
}

.info{
  margin-top:15px;
  font-size:13px;
  opacity:.85;
  text-align:center;
}
</style>
</head>

<body>

<script>
// 🔐 COMPTE OBLIGATOIRE
const currentUser = localStorage.getItem("currentUser");
if(!currentUser){
  window.location.href = "login.html";
}
</script>

<header>
  <h1>💰 Classement Crédits</h1>
  <small>Top 50 – Basé sur les crédits possédés</small>
</header>

<main>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>ID</th>
      <th>Crédits</th>
    </tr>
  </thead>
  <tbody id="rankingBody"></tbody>
</table>

<div class="info" id="myRankInfo"></div>

<div class="info">
  Les crédits sont gagnés via les publicités, le parrainage et les activités.
</div>

</main>

<script>
// 📊 RÉCUPÉRATION DES UTILISATEURS
let users = [];

for(let key in localStorage){
  if(key.startsWith("user_")){
    const user = JSON.parse(localStorage.getItem(key));
    if(user && user.id){
      users.push({
        id: user.id,
        credits: parseInt(user.credits) || 0
      });
    }
  }
}

// 🔽 TRI PAR CRÉDITS
users.sort((a,b)=>b.credits - a.credits);

// 🔢 TOP 50
const top50 = users.slice(0,50);

// 🖥️ AFFICHAGE
const tbody = document.getElementById("rankingBody");
let myRank = null;

top50.forEach((user, index)=>{
  const tr = document.createElement("tr");

  if(index === 0) tr.classList.add("rank1");
  if(index === 1) tr.classList.add("rank2");
  if(index === 2) tr.classList.add("rank3");
  if(user.id === currentUser) tr.classList.add("me");

  tr.innerHTML = `
    <td>${index + 1}</td>
    <td>${user.id}</td>
    <td>${user.credits}</td>
  `;
  tbody.appendChild(tr);
});

// 📍 POSITION PERSONNELLE
users.forEach((user, index)=>{
  if(user.id === currentUser){
    myRank = index + 1;
  }
});

if(myRank){
  document.getElementById("myRankInfo").innerText =
    "👉 Ta position actuelle : " + myRank + " / " + users.length;
}else{
  document.getElementById("myRankInfo").innerText =
    "👉 Tu n’es pas encore classé.";
}
</script>

</body>
</html>

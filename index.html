<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Accueil</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: url('https://example.com/eu-flag.jpg') no-repeat center center/cover;
            color: white;
            font-family: Arial, sans-serif;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://example.com/anonymous-mask.png') no-repeat center center/40%; /* Image d'Anonymous par-dessus */
            opacity: 0.8;
        }
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        <h1>Bienvenue</h1>
        <p>Nous sommes Anonymous</p>
        <audio autoplay>
            <source src="ton-message-audio.mp3" type="audio/mpeg">
            Votre navigateur ne supporte pas l'audio.
        </audio>
    </div>
</body>
</html>

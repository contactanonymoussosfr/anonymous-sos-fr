<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  font-family: Arial, Helvetica, sans-serif;
}

/* FOND NOIR + ROUGE */
body {
  background: linear-gradient(135deg, #000000, #5a0000);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

/* CARTE CENTRALE */
.box {
  background: rgba(0,0,0,0.7);
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 0 40px rgba(255,0,0,0.4);
}

/* TITRES */
h1 {
  margin: 0 0 10px;
  letter-spacing: 2px;
}

p {
  font-size: 14px;
  opacity: 0.9;
  line-height: 1.5;
}

/* BOUTONS */
button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  font-size: 15px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.btn-login {
  background: #cccccc;
  color: #000;
}

.btn-register {
  background: #c4161c;
  color: white;
}

/* AUDIO */
audio {
  width: 100%;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="box">
  <h1>ANONYMOUS SOS FR</h1>
  <p>
    Plateforme communautaire.<br>
    Accès réservé aux membres.
  </p>

  <audio controls>
    <source src="anonymous-voice.mp3" type="audio/mpeg">
    Votre navigateur ne supporte pas l’audio.
  </audio>

  <button class="btn-login">Connexion</button>
  <button class="btn-register">Créer un compte</button>
</div>

</body>
</html>

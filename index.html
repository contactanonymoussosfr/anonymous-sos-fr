<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #fff;
  background: linear-gradient(to bottom, #6a0000, #1a0000);
}

/* BARRE HAUT */
.topbar {
  background: linear-gradient(to right, #8b0000, #c00000);
  padding: 10px;
  text-align: center;
}
.topbar a {
  color: #fff;
  text-decoration: none;
  margin: 0 8px;
  padding: 6px 12px;
  border: 1px solid rgba(255,255,255,0.4);
}
.status {
  margin-top: 5px;
  font-size: 13px;
}

/* CONTENU */
.center {
  text-align: center;
  padding: 60px 20px;
}

h1 {
  font-size: 28px;
}
.badge {
  background: #1da1f2;
  border-radius: 50%;
  padding: 2px 6px;
  font-size: 12px;
}

.cards {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 15px;
}

.card {
  border: 1px solid #ff3b3b;
  padding: 15px;
  background: rgba(0,0,0,0.3);
}

/* CACHÉ SI NON CONNECTÉ */
.protected { display: none; }
body.connected .protected { display: block; }
</style>
</head>

<body>

<div class="topbar">
  <a href="connexion.html">Connexion</a>
  <a href="inscription.html">Créer un compte</a>
  <a href="#" onclick="logout()">Déconnexion</a>
  <div class="status" id="status"></div>
</div>

<div class="center">
  <h1>Anonymous SOS FR <span class="badge">✔</span></h1>

  <p>
    Nous sommes Anonymous. Nous sommes légion.<br>
    Nous n’oublions pas. Nous ne pardonnons pas.<br>
    Vous êtes chez vous.
  </p>

  <div class="protected">
    <div class="cards">
      <div class="card">📞 +32 456 89 43 35</div>
      <div class="card">✉️ despreschez@gmail.com</div>
      <div class="card">🎵 TikTok @anonymous_sos_fr</div>
      <div class="card">🎵 TikTok @popysa5</div>
    </div>

    <p style="margin-top:20px;">
      <a href="https://wa.me/32456894335" style="color:#00ff6a;">
        🆘 SOS WhatsApp
      </a>
    </p>
  </div>
</div>

<script>
function updateStatus() {
  const user = localStorage.getItem("user");
  const status = document.getElementById("status");

  if (user) {
    document.body.classList.add("connected");
    status.innerHTML = "🟢 Connecté – " + user;
  } else {
    document.body.classList.remove("connected");
    status.innerHTML = "🔴 Non connecté";
  }
}

function logout() {
  localStorage.removeItem("user");
  updateStatus();
}

updateStatus();
</script>

</body>
</html>

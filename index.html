<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Anonymous SOS FR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
        url("anonymous-bg.jpg") center / cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eaffea;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: rgba(0,0,0,0.65);
      border: 1px solid #00ff88;
      border-radius: 14px;
      padding: 30px;
      box-shadow: 0 0 25px rgba(0,255,136,0.35);
      backdrop-filter: blur(6px);
    }

    h1 {
      text-align: center;
      color: #00ff88;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 8px;
    }

    .btn-create {
      background: #007bff;
      color: white;
    }

    .btn-login {
      background: #00c853;
      color: black;
    }

    .status {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      min-height: 18px;
    }

    footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Anonymous SOS FR</h1>
    <div class="subtitle">
      Plateforme communautaire sécurisée et responsable
    </div>

    <input type="email" id="email" placeholder="Adresse e-mail">
    <input type="password" id="password" placeholder="Mot de passe">

    <button class="btn-create" onclick="register()">Créer un compte</button>
    <button class="btn-login" onclick="login()">Se connecter</button>

    <div class="status" id="status"></div>

    <footer>© Anonymous SOS FR</footer>
  </div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
      authDomain: "anonymous-sos-fr.firebaseapp.com",
      projectId: "anonymous-sos-fr",
      storageBucket: "anonymous-sos-fr.firebasestorage.app",
      messagingSenderId: "490705618757",
      appId: "1:490705618757:web:fbebdbcb4b4d6d81b2a02c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const status = document.getElementById("status");

    window.register = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          status.innerHTML = "Compte créé avec succès ✅";
        })
        .catch(err => {
          status.innerHTML = "Erreur : " + err.message;
        });
    };

    window.login = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          status.innerHTML = "Connexion réussie ✅";
        })
        .catch(err => {
          status.innerHTML = "Identifiants invalides ❌";
        });
    };

    onAuthStateChanged(auth, user => {
      if (user) {
        status.innerHTML = "Connecté : " + user.email;
      }
    });
  </script>

</body>
</html>

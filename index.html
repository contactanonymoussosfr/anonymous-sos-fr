<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.85)),
    url("background-anonymous.jpg") center/cover no-repeat fixed;
  color:#c8ffcf;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:100%;
  max-width:520px;
  background:rgba(0,0,0,.6);
  border:2px solid #00ff88;
  box-shadow:0 0 40px #00ff88;
  border-radius:16px;
  padding:30px;
  animation:glow 4s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 20px #00ff88}
  to{box-shadow:0 0 45px #00ffaa}
}

h1{
  text-align:center;
  color:#00ff88;
  margin-bottom:10px;
  letter-spacing:2px;
}

.subtitle{
  text-align:center;
  font-size:14px;
  opacity:.85;
  margin-bottom:20px;
}

.values{
  font-size:14px;
  line-height:1.5;
  margin-bottom:25px;
}

.values span{color:#00ff88}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:6px;
  background:#111;
  color:#00ff88;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}

.register{background:#007bff;color:white}
.login{background:#00ff88;color:black}

button:hover{opacity:.85}

#status{
  margin-top:12px;
  text-align:center;
  font-size:13px;
}

footer{
  margin-top:20px;
  text-align:center;
  font-size:12px;
  opacity:.6;
}
</style>
</head>

<body>

<div class="container">

<h1>Anonymous SOS FR</h1>
<div class="subtitle">Plateforme communautaire sécurisée</div>

<div class="values">
<span>•</span> Anonymat respecté<br>
<span>•</span> Aucune haine, aucune violence<br>
<span>•</span> Responsabilité individuelle<br>
<span>•</span> Projet indépendant, non officiel
</div>

<input id="email" type="email" placeholder="Adresse email">
<input id="password" type="password" placeholder="Mot de passe">

<button class="register" onclick="register()">Créer un compte</button>
<button class="login" onclick="login()">Se connecter</button>

<div id="status"></div>

<footer>© Anonymous SOS FR — Tous droits réservés</footer>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.appspot.com",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:fbebdbcb4b4d6d81b2a02c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const status = document.getElementById("status");

window.register = function(){
  createUserWithEmailAndPassword(auth,email.value,password.value)
  .then(()=> status.textContent="Compte créé avec succès")
  .catch(e=> status.textContent=e.message);
}

window.login = function(){
  signInWithEmailAndPassword(auth,email.value,password.value)
  .then(()=> status.textContent="Connexion réussie")
  .catch(()=> status.textContent="Identifiants invalides");
}
</script>

</body>
</html>

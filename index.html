<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

/* ===== BACKGROUND ANONYMOUS (SÛR À 100%) ===== */
body {
  height: 100vh;
  background:
    radial-gradient(circle at top, rgba(0,255,100,0.25), transparent 45%),
    repeating-linear-gradient(
      90deg,
      rgba(0,255,100,0.05) 0,
      rgba(0,255,100,0.05) 1px,
      transparent 1px,
      transparent 6px
    ),
    linear-gradient(180deg, #050505, #000);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #eaffea;
  overflow: hidden;
}

/* ANIMATION LENTE DU FOND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 20px,
      rgba(0,255,100,0.04) 21px
    );
  animation: scan 8s linear infinite;
  pointer-events: none;
}

@keyframes scan {
  from { transform: translateY(-100px); }
  to   { transform: translateY(100px); }
}

/* ===== CARTE CENTRALE ===== */
.card {
  width: 380px;
  background: rgba(5, 10, 5, 0.85);
  border-radius: 16px;
  padding: 28px;
  border: 2px solid #00ff66;
  box-shadow: 0 0 45px #00ff66;
  z-index: 1;
}

/* TITRES */
h1 {
  text-align: center;
  color: #00ff66;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.subtitle {
  text-align: center;
  font-size: 14px;
  opacity: 0.85;
  margin-bottom: 16px;
}

/* TEXTE */
ul {
  font-size: 13px;
  margin-bottom: 18px;
  line-height: 1.6;
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #eaeaea;
}

/* BOUTONS */
button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.btn-create {
  background: #1e90ff;
  color: white;
}

.btn-login {
  background: #00ff66;
  color: black;
}

/* STATUS */
#status {
  margin-top: 10px;
  font-size: 13px;
  min-height: 18px;
  text-align: center;
}

/* FOOTER */
footer {
  text-align: center;
  margin-top: 14px;
  font-size: 11px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="card">
  <h1>Anonymous SOS FR</h1>
  <div class="subtitle">Plateforme communautaire indépendante et sécurisée</div>

  <ul>
    <li>Anonymat respecté</li>
    <li>Aucune haine, aucune violence</li>
    <li>Responsabilité individuelle</li>
    <li>Projet non officiel Anonymous</li>
  </ul>

  <input id="email" type="email" placeholder="Adresse email">
  <input id="password" type="password" placeholder="Mot de passe">

  <button class="btn-create" onclick="register()">Créer un compte</button>
  <button class="btn-login" onclick="login()">Se connecter</button>

  <div id="status"></div>

  <footer>© Anonymous SOS FR — Tous droits réservés</footer>
</div>

<!-- ===== FIREBASE AUTH ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.firebasestorage.app",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:ac31fc1073d9f858b2a02c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const status = document.getElementById("status");

window.register = () => {
  status.textContent = "Création du compte...";
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => status.textContent = "Compte créé avec succès ✔")
    .catch(err => status.textContent = err.message);
};

window.login = () => {
  status.textContent = "Connexion...";
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => status.textContent = "Connexion réussie ✔")
    .catch(() => status.textContent = "Identifiants invalides");
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.75)
    ),
    url("https://i.imgur.com/7QZ6FQp.jpg") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.container {
    background: rgba(0,0,0,0.6);
    padding: 40px 30px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    border-radius: 12px;
}

h1 {
    margin-bottom: 10px;
    letter-spacing: 2px;
}

.subtitle {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 25px;
}

.message {
    font-size: 13px;
    margin-bottom: 25px;
    line-height: 1.5;
    opacity: 0.9;
}

.radio {
    margin-bottom: 25px;
}

.radio audio {
    width: 100%;
}

button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
}

.login {
    background: #ffffff;
    color: black;
}

.register {
    background: #e50914;
    color: white;
}

.footer {
    margin-top: 20px;
    font-size: 11px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
    <h1>ANONYMOUS SOS FR</h1>
    <div class="subtitle">Plateforme communautaire anonyme</div>

    <div class="message">
        Nous sommes Anonymous.<br>
        Il n’y a pas de pardon chez nous.<br>
        Bienvenue sur le réseau.
    </div>

    <div class="radio">
        <audio controls>
            <source src="" type="audio/mpeg">
            Radio indisponible
        </audio>
    </div>

    <a href="connexion.html">
        <button class="login">Connexion</button>
    </a>

    <a href="inscription.html">
        <button class="register">Inscription</button>
    </a>

    <div class="footer">
        Respect et anonymat obligatoires
    </div>
</div>

</body>
</html>

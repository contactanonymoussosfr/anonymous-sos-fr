<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: 
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.85)),
    url("assets/anonymous-bg.jpg") center/cover no-repeat fixed;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #eaffea;
}

/* Carte centrale */
.card {
  width: 360px;
  background: rgba(0,0,0,0.75);
  border-radius: 14px;
  padding: 25px;
  box-shadow: 0 0 35px #00ff66;
  text-align: center;
}

.card h1 {
  color: #00ff66;
  margin-bottom: 10px;
}

.card p {
  font-size: 14px;
  line-height: 1.5;
  margin-bottom: 15px;
}

/* Inputs */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
  outline: none;
}

/* Boutons */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 15px;
}

.btn-register {
  background: #1e90ff;
  color: white;
}

.btn-login {
  background: #00cc66;
  color: black;
  font-weight: bold;
}

#status {
  margin-top: 12px;
  font-size: 14px;
  min-height: 18px;
}

footer {
  margin-top: 15px;
  font-size: 11px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="card">
  <h1>Anonymous SOS FR</h1>
  <p>
    Plateforme communautaire indépendante et sécurisée.<br>
    • Anonymat respecté<br>
    • Aucune haine, aucune violence<br>
    • Responsabilité individuelle<br>
    • Projet non officiel Anonymous
  </p>

  <input type="email" id="email" placeholder="Adresse email">
  <input type="password" id="password" placeholder="Mot de passe">

  <button class="btn-register" onclick="register()">Créer un compte</button>
  <button class="btn-login" onclick="login()">Se connecter</button>

  <div id="status"></div>

  <footer>© Anonymous SOS FR — Tous droits réservés</footer>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.firebasestorage.app",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:ac31fc1073d9f858b2a02c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const status = document.getElementById("status");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

window.register = () => {
  status.textContent = "Création du compte...";
  createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
    .then(() => {
      status.textContent = "Compte créé avec succès.";
    })
    .catch(err => {
      status.textContent = err.message;
    });
};

window.login = () => {
  status.textContent = "Connexion...";
  signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
    .then(() => {
      status.textContent = "Connecté avec succès.";
    })
    .catch(() => {
      status.textContent = "Identifiants invalides.";
    });
};
</script>

</body>
</html>

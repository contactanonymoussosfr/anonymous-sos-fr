<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
}

/* FOND DRAPEAU EUROPE (SIMPLIFIÉ) */
body {
  background:
    radial-gradient(circle at center, rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
    linear-gradient(180deg, #003399 0%, #002266 100%);
}

/* ÉTOILES EUROPE */
.stars {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 50% 20%, #ffd700 2px, transparent 3px),
    radial-gradient(circle at 65% 30%, #ffd700 2px, transparent 3px),
    radial-gradient(circle at 75% 45%, #ffd700 2px, transparent 3px),
    radial-gradient(circle at 65% 60%, #ffd700 2px, transparent 3px),
    radial-gradient(circle at 50% 70%, #ffd700 2px, transparent 3px),
    radial-gradient(circle at 35% 60%, #ffd700 2px, transparent 3px),
    radial-gradient(circle at 25% 45%, #ffd700 2px, transparent 3px),
    radial-gradient(circle at 35% 30%, #ffd700 2px, transparent 3px);
  opacity: 0.6;
}

/* MASQUE ANONYMOUS (SVG INTÉGRÉ) */
.mask {
  position: fixed;
  inset: 0;
  background:
    url("data:image/svg+xml;utf8,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 260'>
<path fill='white' d='M100 10c45 0 80 35 80 80v40c0 60-35 110-80 120-45-10-80-60-80-120V90c0-45 35-80 80-80z'/>
<path fill='black' d='M55 95c15-20 40-20 55 0-15 10-40 10-55 0zm35 0c15-20 40-20 55 0-15 10-40 10-55 0z'/>
<path fill='black' d='M70 150c20 10 40 10 60 0-10 20-50 20-60 0z'/>
</svg>")
    center/30% no-repeat;
  opacity: 0.12;
}

/* TEXTE SIMPLE */
.text {
  position: fixed;
  bottom: 8%;
  width: 100%;
  text-align: center;
  color: #ffffff;
  font-size: 20px;
  letter-spacing: 2px;
  opacity: 0.85;
}

/* AUDIO CACHÉ */
audio {
  display: none;
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="mask"></div>

<div class="text">
  Bienvenue — Nous sommes Anonymous
</div>

<audio id="voice" autoplay muted>
  <source src="anonymous-voice.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("voice");
document.addEventListener("click", () => {
  audio.muted = false;
  audio.play();
}, { once: true });
</script>

</body>
</html>

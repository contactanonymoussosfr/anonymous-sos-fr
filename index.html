<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Anonymous SOS FR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #eaeaea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #151515;
      padding: 25px;
      border-radius: 10px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #00ff88;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    .register {
      background: #007bff;
      color: white;
    }

    .login {
      background: #00ff88;
      color: black;
    }

    .logout {
      background: #ff4444;
      color: white;
      display: none;
    }

    .status {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Anonymous SOS FR</h1>

    <input type="email" id="email" placeholder="Adresse email">
    <input type="password" id="password" placeholder="Mot de passe">

    <button class="register" onclick="register()">S'inscrire</button>
    <button class="login" onclick="login()">Se connecter</button>
    <button class="logout" id="logoutBtn" onclick="logout()">Se déconnecter</button>

    <div class="status" id="status">Déconnecté</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
      authDomain: "anonymous-sos-fr.firebaseapp.com",
      projectId: "anonymous-sos-fr",
      storageBucket: "anonymous-sos-fr.firebasestorage.app",
      messagingSenderId: "490705618757",
      appId: "1:490705618757:web:fbebdbcb4b4d6d81b2a02c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const status = document.getElementById("status");
    const logoutBtn = document.getElementById("logoutBtn");

    window.register = () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .catch(err => alert(err.message));
    };

    window.login = () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .catch(err => alert(err.message));
    };

    window.logout = () => {
      signOut(auth);
    };

    onAuthStateChanged(auth, user => {
      if (user) {
        status.innerText = "Connecté : " + user.email;
        logoutBtn.style.display = "block";
      } else {
        status.innerText = "Déconnecté";
        logoutBtn.style.display = "none";
      }
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Accueil</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #ff0000 url('https://example.com/anonymous-image.jpg') no-repeat center center/cover;
            color: white;
            font-family: Arial, sans-serif;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
            animation: flash 3s infinite;
        }
        @keyframes flash {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <audio autoplay>
        <source src="ton-message-audio.mp3" type="audio/mpeg">
        Votre navigateur ne supporte pas l'audio.
    </audio>
</body>
</html>

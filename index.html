<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background: radial-gradient(circle at top, #5a1a1a, #0b0b0b);
  color:#fff;
}
header{
  display:flex;
  justify-content:center;
  gap:15px;
  padding:15px;
  background:#111;
  border-bottom:1px solid #a00000;
}
header button{
  padding:10px 18px;
  border-radius:8px;
  border:1px solid #444;
  background:#222;
  color:#fff;
  cursor:pointer;
}
header button.primary{
  background:#c00000;
}
header button:disabled{
  opacity:.5;
  cursor:not-allowed;
}
#status{
  text-align:center;
  margin-top:10px;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}
h1{color:#ff2a2a;}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}
.card{
  background:#151515;
  border:1px solid #b00000;
  border-radius:15px;
  padding:25px;
}
.card h3{color:#ff2a2a;}
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:#111;
  padding:25px;
  border-radius:15px;
  border:1px solid red;
  width:320px;
}
.modal-content input{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}
.modal-content button{
  width:100%;
  padding:10px;
  background:#c00000;
  border:none;
  color:white;
  border-radius:8px;
}
.close{
  text-align:right;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <button onclick="openLogin()">Connexion</button>
  <button class="primary" onclick="openRegister()">Créer un compte</button>
  <button onclick="logout()">Déconnexion</button>
</header>

<div id="status"></div>

<div class="container">
  <h1>Plateforme communautaire indépendante</h1>

  <div class="cards">
    <div class="card">
      <h3>Anonymat</h3>
      <p>Votre identité est protégée. Seul votre ID est visible.</p>
    </div>
    <div class="card">
      <h3>Création de sites web</h3>
      <p>Sites, plateformes et services de A à Z.</p>
    </div>
    <div class="card">
      <h3>Opportunités</h3>
      <p>Regardez des vidéos complètes pour gagner de l’argent.</p>
    </div>
  </div>
</div>

<!-- MODAL CONNEXION -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <div class="close" onclick="closeModals()">✖</div>
    <h3>Connexion</h3>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Mot de passe">
    <button onclick="login()">Connexion</button>
  </div>
</div>

<!-- MODAL INSCRIPTION -->
<div class="modal" id="registerModal">
  <div class="modal-content">
    <div class="close" onclick="closeModals()">✖</div>
    <h3>Créer un compte</h3>
    <input id="regEmail" placeholder="Email">
    <input id="regId" placeholder="ID (pseudo)">
    <input id="regPass" type="password" placeholder="Mot de passe">
    <button onclick="register()">Créer</button>
  </div>
</div>

<script>
let connectedUser = localStorage.getItem("connectedUser");
updateStatus();

function openLogin(){document.getElementById("loginModal").style.display="flex";}
function openRegister(){document.getElementById("registerModal").style.display="flex";}
function closeModals(){document.querySelectorAll(".modal").forEach(m=>m.style.display="none");}

function register(){
  const email=regEmail.value;
  const pass=regPass.value;
  const id=regId.value;
  if(!email||!pass||!id) return alert("Champs manquants");
  localStorage.setItem("user_"+email, JSON.stringify({email,pass,id}));
  localStorage.setItem("connectedUser", id);
  connectedUser=id;
  closeModals();
  updateStatus();
}

function login(){
  const email=loginEmail.value;
  const pass=loginPass.value;
  const data=localStorage.getItem("user_"+email);
  if(!data) return alert("Compte introuvable");
  const user=JSON.parse(data);
  if(user.pass!==pass) return alert("Mot de passe incorrect");
  localStorage.setItem("connectedUser", user.id);
  connectedUser=user.id;
  closeModals();
  updateStatus();
}

function logout(){
  localStorage.removeItem("connectedUser");
  connectedUser=null;
  updateStatus();
}

function updateStatus(){
  const status=document.getElementById("status");
  const buttons=document.querySelectorAll("header button");
  if(connectedUser){
    status.innerHTML="✅ Connecté en tant que <strong>"+connectedUser+"</strong>";
    buttons[0].disabled=true;
    buttons[1].disabled=true;
    buttons[2].disabled=false;
  }else{
    status.innerHTML="❌ Non connecté";
    buttons[0].disabled=false;
    buttons[1].disabled=false;
    buttons[2].disabled=true;
  }
}
</script>

</body>

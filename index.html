<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.85)),
    url("images/background.jpg") center / cover no-repeat fixed;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #eaffea;
}

.card {
  background: rgba(0,0,0,0.7);
  border: 2px solid #2cff66;
  box-shadow: 0 0 30px #2cff66;
  border-radius: 14px;
  padding: 30px;
  width: 360px;
  text-align: center;
}

h1 {
  color: #2cff66;
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  line-height: 1.4;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 6px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 15px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.btn-create {
  background: #007bff;
  color: white;
}

.btn-login {
  background: #2cff66;
  color: black;
}

#status {
  margin-top: 12px;
  font-size: 13px;
  color: #ff6666;
}

footer {
  margin-top: 15px;
  font-size: 11px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="card">
  <h1>Anonymous SOS FR</h1>
  <p>
    Plateforme communautaire indépendante et sécurisée.<br>
    Anonymat respecté • Responsabilité individuelle • Aucun abus toléré
  </p>

  <input type="email" id="email" placeholder="Adresse email">
  <input type="password" id="password" placeholder="Mot de passe">

  <button class="btn-create" onclick="register()">Créer un compte</button>
  <button class="btn-login" onclick="login()">Se connecter</button>

  <div id="status"></div>

  <footer>© Anonymous SOS FR — Tous droits réservés</footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.appspot.com",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:fbebdbcb4b4d6d81b2a02c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const status = document.getElementById("status");

window.register = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      status.style.color = "#2cff66";
      status.textContent = "Compte créé avec succès";
    })
    .catch(error => {
      status.textContent = error.message;
    });
};

window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      status.style.color = "#2cff66";
      status.textContent = "Connexion réussie";
    })
    .catch(() => {
      status.textContent = "Identifiants invalides";
    });
};
</script>

</body>
</html>

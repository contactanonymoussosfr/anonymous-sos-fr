<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Films</title>
<style>
body {
  background:#0b0b0b;
  color:white;
  font-family:Arial;
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
  gap:15px;
}
.movie {
  cursor:pointer;
}
.movie img {
  width:100%;
  border-radius:8px;
}
</style>
</head>
<body>

<h1>🎬 Films disponibles</h1>

<div class="grid">
  <div class="movie" onclick="location.href='watch.html?id=film1'">
    <img src="images/film1.jpg">
  </div>
  <div class="movie" onclick="location.href='watch.html?id=film2'">
    <img src="images/film2.jpg">
  </div>
</div>

</body>
</html>

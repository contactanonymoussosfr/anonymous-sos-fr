<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #111 0%, #000 70%);
  color: #eaeaea;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  background: #111;
  border-radius: 12px;
  padding: 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 0 40px rgba(0,255,0,0.15);
  text-align: center;
}

h1 {
  margin-bottom: 10px;
  color: #00ff88;
}

p {
  font-size: 14px;
  color: #aaa;
  margin-bottom: 25px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: none;
  background: #1c1c1c;
  color: #fff;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 8px;
}

.btn-login {
  background: #00aa66;
  color: #000;
}

.btn-register {
  background: #0066ff;
  color: #fff;
}

button:hover {
  opacity: 0.9;
}

#status {
  margin-top: 15px;
  font-size: 14px;
}

footer {
  margin-top: 25px;
  font-size: 12px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">
  <h1>Anonymous SOS FR</h1>
  <p>Plateforme communautaire sécurisée</p>

  <input type="email" id="email" placeholder="Adresse email">
  <input type="password" id="password" placeholder="Mot de passe">

  <button class="btn-register" onclick="register()">Créer un compte</button>
  <button class="btn-login" onclick="login()">Se connecter</button>

  <div id="status"></div>

  <footer>© Anonymous SOS FR</footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.firebasestorage.app",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:fbebdbcb4b4d6d81b2a02c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const status = document.getElementById("status");

window.register = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      status.innerText = "Compte créé avec succès ✔️";
    })
    .catch(err => {
      status.innerText = err.message;
    });
};

window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      status.innerText = "Connecté ✔️";
    })
    .catch(err => {
      status.innerText = "Identifiants incorrects";
    });
};

onAuthStateChanged(auth, user => {
  if (user) {
    status.innerText = "Connecté : " + user.email;
  }
});
</script>

</body>
</html>

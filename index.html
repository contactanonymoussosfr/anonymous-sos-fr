<script type="module">
  // Firebase SDKs
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

  // Configuration Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
    authDomain: "anonymous-sos-fr.firebaseapp.com",
    projectId: "anonymous-sos-fr",
    storageBucket: "anonymous-sos-fr.firebasestorage.app",
    messagingSenderId: "490705618757",
    appId: "1:490705618757:web:fbebdbcb4b4d6d81b2a02c"
  };

  // Init Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const status = document.getElementById("status");

  // INSCRIPTION
  window.register = () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => {
        status.innerText = "✅ Compte créé avec succès";
      })
      .catch((error) => {
        status.innerText = "❌ " + error.message;
      });
  };

  // CONNEXION
  window.login = () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        status.innerText = "✅ Connexion réussie";
      })
      .catch((error) => {
        status.innerText = "❌ " + error.message;
      });
  };

  // DÉCONNEXION
  window.logout = () => {
    signOut(auth);
  };

  // ÉTAT UTILISATEUR
  onAuthStateChanged(auth, (user) => {
    if (user) {
      status.innerText = "🟢 Connecté : " + user.email;
    } else {
      status.innerText = "🔴 Déconnecté";
    }
  });
</script>

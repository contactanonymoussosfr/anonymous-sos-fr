<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,Arial,sans-serif
}

body{
  background:black;
  color:#eaffea;
  overflow:hidden
}

/* ===== BACKGROUND MATRIX ===== */
canvas{
  position:fixed;
  inset:0;
  z-index:0
}

/* ===== OVERLAY ===== */
.overlay{
  position:relative;
  z-index:2;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center
}

/* ===== CARD ===== */
.card{
  width:380px;
  padding:40px;
  background:rgba(0,0,0,0.78);
  border:2px solid #00ff88;
  border-radius:14px;
  box-shadow:0 0 40px rgba(0,255,136,.6);
  text-align:center
}

/* ===== MASK ===== */
.mask{
  width:120px;
  height:120px;
  margin:0 auto 20px;
  border-radius:50%;
  background:radial-gradient(circle,#00ffcc,#002a22);
  box-shadow:0 0 25px #00ffcc;
  animation:pulse 4s infinite
}

@keyframes pulse{
  0%{box-shadow:0 0 20px #00ffcc}
  50%{box-shadow:0 0 50px #00ffcc}
  100%{box-shadow:0 0 20px #00ffcc}
}

/* ===== TEXT ===== */
h1{
  color:#00ff88;
  margin-bottom:10px
}

p{
  font-size:14px;
  opacity:.85;
  margin-bottom:20px
}

/* ===== FORM ===== */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:6px;
  border:none;
  background:#111;
  color:#00ff88
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:6px;
  border:none;
  font-weight:bold;
  cursor:pointer
}

.register{
  background:#1e90ff;
  color:#fff
}

.login{
  background:#00c853;
  color:#000
}

.status{
  margin-top:12px;
  font-size:13px;
  min-height:18px
}

/* ===== FOOTER ===== */
footer{
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:12px;
  opacity:.6;
  z-index:2
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="overlay">
  <div class="card">
    <div class="mask"></div>

    <h1>Anonymous SOS FR</h1>
    <p>
      Plateforme communautaire inspirée des valeurs d’anonymat,
      de responsabilité et d’entraide.
    </p>

    <input id="email" type="email" placeholder="Adresse e-mail">
    <input id="password" type="password" placeholder="Mot de passe (6 caractères minimum)">

    <button class="register" onclick="register()">Créer un compte</button>
    <button class="login" onclick="login()">Se connecter</button>

    <div class="status" id="status"></div>
  </div>
</div>

<footer>© Anonymous SOS FR — Tous droits réservés</footer>

<!-- ===== SON DE BIENVENUE ===== -->
<audio id="welcomeSound" src="bienvenue.mp3" preload="auto"></audio>

<!-- ===== MATRIX EFFECT ===== -->
<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&@";
const fontSize = 14;
let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill(1);

function drawMatrix(){
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    const text = chars.charAt(Math.floor(Math.random()*chars.length));
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);
    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(drawMatrix,50);
</script>

<!-- ===== FIREBASE + AUTH ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.firebasestorage.app",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:fbebdbcb4b4d6d81b2a02c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const status = document.getElementById("status");

/* --- INSCRIPTION --- */
window.register = () => {
  if(!emailInput.value || !passwordInput.value){
    status.textContent = "Veuillez remplir tous les champs.";
    return;
  }

  createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
    .then(()=>{
      status.textContent = "Compte créé et connecté ✅";
    })
    .catch(err=>{
      status.textContent = err.message;
    });
};

/* --- CONNEXION --- */
window.login = () => {
  if(!emailInput.value || !passwordInput.value){
    status.textContent = "Veuillez remplir tous les champs.";
    return;
  }

  signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
    .then(()=>{
      status.textContent = "Connexion réussie ✅";
    })
    .catch(()=>{
      status.textContent = "Email ou mot de passe incorrect ❌";
    });
};

/* --- REDIRECTION --- */
onAuthStateChanged(auth, user=>{
  if(user){
    window.location.href = "member.html";
  }
});
</script>

<!-- ===== PLAY WELCOME SOUND (ON FIRST CLICK) ===== -->
<script>
let played = false;
document.addEventListener("click", () => {
  if(!played){
    document.getElementById("welcomeSound").play();
    played = true;
  }
});
</script>

</body>
</html>

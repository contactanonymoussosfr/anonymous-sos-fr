<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: #eaffea;
  overflow-x: hidden;
}

/* ===== BACKGROUND ANIMÉ ===== */
.bg {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at center, rgba(0,255,136,0.15), transparent 70%),
    url("anonymous-bg.png") center/contain no-repeat;
  animation: rotateMask 120s linear infinite;
  z-index: -3;
}

/* Rotation lente */
@keyframes rotateMask {
  from { transform: rotate(0deg) scale(1.1); }
  to { transform: rotate(360deg) scale(1.1); }
}

/* ===== FLASH / GLITCH ===== */
.flash {
  position: fixed;
  inset: 0;
  background: rgba(0,255,136,0.15);
  opacity: 0;
  animation: flashEffect 6s infinite;
  z-index: -2;
}

@keyframes flashEffect {
  0%, 92%, 100% { opacity: 0; }
  93% { opacity: 0.6; }
  94% { opacity: 0.1; }
  95% { opacity: 0.7; }
  96% { opacity: 0; }
}

/* ===== ÉCLAIRS ===== */
.lightning {
  position: fixed;
  inset: 0;
  background:
    linear-gradient(120deg, transparent 45%, rgba(0,255,136,0.8) 50%, transparent 55%);
  opacity: 0;
  animation: lightning 10s infinite;
  z-index: -1;
}

@keyframes lightning {
  0%, 96%, 100% { opacity: 0; }
  97% { opacity: 1; }
  98% { opacity: 0.2; }
}

/* ===== CONTENU ===== */
.main {
  min-height: 100vh;
  padding: 100px 20px;
  text-align: center;
  backdrop-filter: blur(2px);
}

h1 {
  color: #00ff88;
  font-size: 44px;
  margin-bottom: 10px;
  text-shadow: 0 0 15px rgba(0,255,136,0.6);
}

.subtitle {
  max-width: 700px;
  margin: auto;
  opacity: 0.85;
}

/* ===== LOGIN ===== */
.login-box {
  margin: 80px auto;
  max-width: 380px;
  background: rgba(0,0,0,0.75);
  border: 1px solid #00ff88;
  border-radius: 14px;
  padding: 25px;
  box-shadow: 0 0 30px rgba(0,255,136,0.4);
}

.login-box h2 {
  color: #00ff88;
  margin-top: 0;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

.login-box button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.create { background: #007bff; color: white; }
.login { background: #00c853; color: black; }

.status {
  margin-top: 10px;
  font-size: 14px;
}

footer {
  text-align: center;
  font-size: 12px;
  opacity: 0.5;
  padding-bottom: 30px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="flash"></div>
<div class="lightning"></div>

<div class="main">
  <h1>Anonymous SOS FR</h1>
  <p class="subtitle">
    Plateforme communautaire sécurisée inspirée des valeurs d’anonymat,
    de responsabilité et d’entraide.
  </p>

  <div class="login-box">
    <h2>Connexion / Inscription</h2>
    <input id="email" type="email" placeholder="Adresse e-mail">
    <input id="password" type="password" placeholder="Mot de passe">
    <button class="create" onclick="register()">Créer un compte</button>
    <button class="login" onclick="login()">Se connecter</button>
    <div class="status" id="status"></div>
  </div>

  <footer>© Anonymous SOS FR — Tous droits réservés</footer>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.firebasestorage.app",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:fbebdbcb4b4d6d81b2a02c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const status = document.getElementById("status");

window.register = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => status.textContent = "Compte créé ✅")
    .catch(e => status.textContent = e.message);
};

window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => status.textContent = "Connexion réussie ✅")
    .catch(() => status.textContent = "Identifiants invalides ❌");
};

onAuthStateChanged(auth, user => {
  if (user) status.textContent = "Connecté : " + user.email;
});
</script>

</body>
</html>

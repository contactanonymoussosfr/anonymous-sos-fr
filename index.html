<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #111;
  border: 2px solid red;
  border-radius: 12px;
  padding: 30px;
  width: 320px;
  text-align: center;
  z-index: 10;
}

input {
  width: 100%;
  padding: 12px;
  margin: 15px 0;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  background: red;
  color: white;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Choisis ton ID</h2>
  <input type="text" id="userId" placeholder="Anonymous42">
  <button onclick="enter()">Entrer</button>
  <div class="error" id="error"></div>
</div>

<script>
function enter() {
  const id = document.getElementById("userId").value.trim();
  if (id.length < 3) {
    document.getElementById("error").innerText = "ID trop court";
    return;
  }
  localStorage.setItem("anonymous_id", id);
  window.location.href = "member.html";
}

// Si déjà enregistré → accès direct
if (localStorage.getItem("anonymous_id")) {
  window.location.href = "member.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  margin: 0;
  background: #0f0f0f url("https://i.imgur.com/7QZ6FQp.jpg") center/cover fixed;
  color: #fff;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 60px;
  background: rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid #222;
  z-index: 100;
}

.logo {
  font-weight: bold;
  letter-spacing: 2px;
}

header a {
  color: #fff;
  text-decoration: none;
  margin-left: 15px;
  font-size: 14px;
}

/* FEED */
.feed {
  max-width: 480px;
  margin: 90px auto 40px;
}

.post {
  background: rgba(0,0,0,0.9);
  border: 1px solid #222;
  border-radius: 6px;
  margin-bottom: 20px;
}

.post-header {
  padding: 10px;
  font-weight: bold;
  border-bottom: 1px solid #222;
}

.post-content {
  padding: 15px;
  font-size: 14px;
}

.post-footer {
  padding: 10px;
  font-size: 12px;
  opacity: 0.6;
}

/* RADIO */
.radio-box {
  background: rgba(0,0,0,0.9);
  border: 1px solid #222;
  border-radius: 6px;
  padding: 15px;
  margin-bottom: 20px;
  text-align: center;
}

.radio-box h3 {
  margin: 0 0 10px;
  font-size: 14px;
  font-weight: normal;
  opacity: 0.8;
}

audio {
  width: 100%;
}
</style>
</head>

<body>

<header>
  <div class="logo">ANONYMOUS</div>
  <div>
    <a href="connexion.html">Connexion</a>
    <a href="inscription.html">Inscription</a>
  </div>
</header>

<div class="feed">

  <!-- RADIO -->
  <div class="radio-box">
    <h3>🔊 Radio libre</h3>
    <audio controls>
      <source src="URL_DE_TA_RADIO_ICI" type="audio/mpeg">
      Votre navigateur ne supporte pas la radio.
    </audio>
  </div>

  <!-- POSTS -->
  <div class="post">
    <div class="post-header">@system</div>
    <div class="post-content">
      Bienvenue sur la plateforme.  
      Créez un compte pour participer.
    </div>
    <div class="post-footer">aujourd’hui</div>
  </div>

  <div class="post">
    <div class="post-header">@anonymous</div>
    <div class="post-content">
      Respect, anonymat et échanges libres.
    </div>
    <div class="post-footer">il y a quelques minutes</div>
  </div>

</div>

</body>
</html>

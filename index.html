<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body{
  height:100vh;
  background:black;
  color:#eafff5;
  overflow:hidden;
}

/* ===== BACKGROUND MATRIX ===== */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* ===== OVERLAY ===== */
.overlay{
  position:relative;
  z-index:1;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at center, rgba(0,255,136,0.15), rgba(0,0,0,0.9));
}

/* ===== CARD ===== */
.card{
  width:360px;
  padding:30px;
  border-radius:16px;
  border:2px solid #00ff88;
  background:rgba(0,0,0,0.75);
  box-shadow:0 0 40px #00ff88;
  text-align:center;
}

h1{
  color:#00ff88;
  margin-bottom:10px;
}

p{
  font-size:14px;
  opacity:0.85;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:none;
  outline:none;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}

.btn-create{ background:#2e86ff; color:white; }
.btn-login{ background:#00ff88; color:black; }

#status{
  margin-top:15px;
  font-size:13px;
  color:#ff6b6b;
}

footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="overlay">
  <div class="card">
    <h1>Anonymous SOS FR</h1>
    <p>Plateforme communautaire sécurisée</p>

    <input id="email" type="email" placeholder="Adresse email">
    <input id="password" type="password" placeholder="Mot de passe (6 caractères min)">

    <button class="btn-create" onclick="register()">Créer un compte</button>
    <button class="btn-login" onclick="login()">Se connecter</button>

    <div id="status"></div>

    <footer>© Anonymous SOS FR</footer>
  </div>
</div>

<!-- ===== FIREBASE ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.firebasestorage.app",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:fbebdbcb4b4d6d81b2a02c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const status = document.getElementById("status");

window.register = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => status.style.color="#00ff88", status.textContent="Compte créé avec succès")
    .catch(e => status.textContent = e.message);
}

window.login = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => status.style.color="#00ff88", status.textContent="Connexion réussie")
    .catch(() => status.textContent="Identifiants invalides");
}
</script>

<!-- ===== MATRIX EFFECT ===== -->
<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.1)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  drops.forEach((y, i) => {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, y * fontSize);
    if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
setInterval(draw, 33);
</script>

</body>
</html>

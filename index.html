<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
  font-family:Segoe UI, Arial, sans-serif;
}

body{
  margin:0;
  height:100vh;
  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
    url("https://images.unsplash.com/photo-1614064641938-3bbee52942c7?auto=format&fit=crop&w=1600&q=80");
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#eafff4;
}

/* Carte centrale */
.card{
  width:100%;
  max-width:420px;
  background:rgba(0,0,0,0.65);
  border:2px solid #00ff88;
  border-radius:18px;
  padding:35px;
  box-shadow:0 0 45px rgba(0,255,136,0.6);
  text-align:center;
  animation: glow 3s infinite alternate;
}

@keyframes glow{
  from{ box-shadow:0 0 25px rgba(0,255,136,0.4); }
  to{ box-shadow:0 0 55px rgba(0,255,136,0.9); }
}

h1{
  margin:0;
  font-size:32px;
  color:#00ff88;
}

.subtitle{
  margin:10px 0 25px;
  font-size:14px;
  opacity:0.85;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:none;
  font-size:15px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.btn-create{
  background:#1e90ff;
  color:white;
}

.btn-login{
  background:#00ff88;
  color:black;
}

button:hover{
  opacity:0.9;
}

.status{
  margin-top:15px;
  font-size:14px;
  min-height:18px;
}

footer{
  margin-top:18px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="card">
  <h1>Anonymous SOS FR</h1>
  <div class="subtitle">
    Plateforme communautaire sécurisée<br>
    Anonymat • Responsabilité • Entraide
  </div>

  <input type="email" id="email" placeholder="Adresse email">
  <input type="password" id="password" placeholder="Mot de passe">

  <button class="btn-create" onclick="register()">Créer un compte</button>
  <button class="btn-login" onclick="login()">Se connecter</button>

  <div class="status" id="status"></div>

  <footer>© Anonymous SOS FR — Tous droits réservés</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
    authDomain: "anonymous-sos-fr.firebaseapp.com",
    projectId: "anonymous-sos-fr",
    storageBucket: "anonymous-sos-fr.firebasestorage.app",
    messagingSenderId: "490705618757",
    appId: "1:490705618757:web:fbebdbcb4b4d6d81b2a02c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const status = document.getElementById("status");

  window.register = function(){
    const email = email.value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(()=>{
        window.location.href = "member.html";
      })
      .catch(e=>{
        status.textContent = e.message;
      });
  }

  window.login = function(){
    const email = email.value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(()=>{
        window.location.href = "member.html";
      })
      .catch(()=>{
        status.textContent = "Identifiants invalides";
      });
  }
</script>

</body>
</html>

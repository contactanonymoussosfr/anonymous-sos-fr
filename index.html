<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background:linear-gradient(to bottom,#6a0000,#120000);
  min-height:100vh;
}

/* BARRE HAUT */
.topbar{
  background:#b00000;
  padding:10px;
  text-align:right;
}
.topbar a{
  color:#fff;
  text-decoration:none;
  margin-left:10px;
  padding:6px 12px;
  border:1px solid rgba(255,255,255,.4);
}
.status{
  text-align:center;
  font-size:13px;
  margin-top:5px;
}

/* CONTENU */
.center{
  text-align:center;
  padding:60px 20px 120px;
}

h1{font-size:28px}
.badge{
  background:#1da1f2;
  border-radius:50%;
  padding:2px 6px;
  font-size:12px;
}

/* CARRES EN BAS */
.bottom{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
}
.cards{
  display:flex;
  gap:15px;
}
.card{
  border:1px solid #ff3b3b;
  padding:12px 16px;
  font-size:13px;
  background:rgba(0,0,0,.4);
}

/* PROTECTION */
.protected{display:none}
body.connected .protected{display:flex}
</style>
</head>

<body>

<div class="topbar">
  <a href="connexion.html">Connexion</a>
  <a href="inscription.html">Créer un compte</a>
  <a href="#" onclick="logout()">Déconnexion</a>
</div>

<div class="status" id="status"></div>

<div class="center">
  <h1>Anonymous SOS FR <span class="badge">✔</span></h1>
  <p>
    Nous sommes Anonymous. Nous sommes légion.<br>
    Nous n’oublions pas. Nous ne pardonnons pas.
  </p>
</div>

<!-- CARRES EN BAS -->
<div class="bottom">
  <div class="cards protected">
    <div class="card">🆘 SOS<br>Aide urgente</div>
    <div class="card">📞 +32 456 89 43 35</div>
    <div class="card">✉️ despreschez@gmail.com</div>
    <div class="card">🎵 TikTok<br>@anonymous_sos_fr</div>
  </div>
</div>

<script>
function update(){
  const user=localStorage.getItem("user");
  const status=document.getElementById("status");
  if(user){
    document.body.classList.add("connected");
    status.innerHTML="🟢 Connecté : "+user;
  }else{
    document.body.classList.remove("connected");
    status.innerHTML="🔴 Non connecté";
  }
}
function logout(){
  localStorage.removeItem("user");
  update();
}
update();
</script>

</body>
</html>

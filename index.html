<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  background:linear-gradient(to bottom,#7a0000,#120000);
  min-height:100vh;
  overflow-x:hidden;
}

/* BARRE HAUT */
.topbar{
  background:#b00000;
  padding:10px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
}
.topbar a{
  color:white;
  text-decoration:none;
  padding:6px 12px;
  border:1px solid rgba(255,255,255,.4);
  border-radius:4px;
  font-size:14px;
}

/* STATUT */
.status{
  text-align:center;
  margin-top:8px;
  font-size:13px;
}

/* CONTENU */
.center{
  text-align:center;
  padding:60px 20px 160px;
}

h1{font-size:30px}
.badge{
  background:#1da1f2;
  border-radius:50%;
  padding:2px 6px;
  font-size:12px;
  margin-left:5px;
}

/* CARTES BAS */
.bottom{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
}
.cards{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}
.card{
  border:1px solid #ff3b3b;
  padding:12px 16px;
  font-size:13px;
  background:rgba(0,0,0,.4);
  min-width:160px;
  text-align:center;
}

/* PROTECTION */
.protected{display:none;}
body.connected .protected{display:flex;}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px 18px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 15px rgba(0,0,0,.5);
}
</style>
</head>

<body>

<div class="topbar">
  <a href="connexion.html">Connexion</a>
  <a href="inscription.html">Créer un compte</a>
  <a href="#" onclick="logout()">Déconnexion</a>
</div>

<div class="status" id="status"></div>

<div class="center">
  <h1>Anonymous SOS FR <span class="badge">✔</span></h1>
  <p>
    Nous sommes Anonymous. Nous sommes légion.<br>
    Nous n’oublions pas. Nous ne pardonnons pas.
  </p>
</div>

<div class="bottom">
  <div class="cards protected" id="cards"></div>
</div>

<a class="whatsapp" href="https://wa.me/32456894335" target="_blank">
  🆘 SOS WhatsApp
</a>

<script>
function update(){
  const user = localStorage.getItem("user");
  const acc = JSON.parse(localStorage.getItem("account"));
  const status = document.getElementById("status");
  const cards = document.getElementById("cards");

  if(user && acc){
    document.body.classList.add("connected");
    status.innerHTML = "🟢 Connecté – ID : " + user;

    cards.innerHTML = `
      <div class="card">🆘 SOS<br>Aide urgente</div>
      <div class="card">📞 Téléphone<br>+32 456 89 43 35</div>
      <div class="card">✉️ Email<br>${acc.email}</div>
      <div class="card">
        🎵 TikTok<br>
        <a href="https://www.tiktok.com/@anonymous_sos_fr" target="_blank" style="color:#ff4d4d;text-decoration:none;">
          Suivre
        </a>
      </div>
      <div class="card">
        ▶️ YouTube<br>
        <a href="https://www.youtube.com/@mrdespres" target="_blank" style="color:#ff4d4d;text-decoration:none;">
          mrdespres
        </a>
      </div>
    `;
  }else{
    document.body.classList.remove("connected");
    status.innerHTML = "🔴 Non connecté";
    cards.innerHTML = "";
  }
}

function logout(){
  localStorage.removeItem("user");
  update();
}

update();
</script>

</body>
</html>

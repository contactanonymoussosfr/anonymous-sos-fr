<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: Arial, Helvetica, sans-serif;
}

/* FOND ANONYMOUS – ROUGE + ECLAIRS (INTÉGRÉ, PAS D’URL) */
body {
  background:
    radial-gradient(circle at center, rgba(255,0,0,0.25), rgba(0,0,0,0.9)),
    repeating-linear-gradient(
      120deg,
      rgba(255,0,0,0.15) 0px,
      rgba(255,0,0,0.15) 2px,
      transparent 2px,
      transparent 6px
    ),
    #000;
}

/* EFFET FLASH / ECLAIR */
@keyframes flash {
  0%, 97%, 100% { opacity: 0; }
  98% { opacity: 0.4; }
}

.flash {
  position: fixed;
  inset: 0;
  background: rgba(255,0,0,0.6);
  animation: flash 6s infinite;
  pointer-events: none;
}

/* MASQUE ANONYMOUS (SVG INTÉGRÉ) */
.mask {
  position: absolute;
  inset: 0;
  background:
    url("data:image/svg+xml;utf8,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 260'>
<path fill='white' d='M100 10c45 0 80 35 80 80v40c0 60-35 110-80 120-45-10-80-60-80-120V90c0-45 35-80 80-80z'/>
<path fill='black' d='M55 95c15-20 40-20 55 0-15 10-40 10-55 0zm35 0c15-20 40-20 55 0-15 10-40 10-55 0z'/>
<path fill='black' d='M70 150c20 10 40 10 60 0-10 20-50 20-60 0z'/>
</svg>")
    center/35% no-repeat;
  opacity: 0.08;
}

/* AUDIO INVISIBLE */
audio {
  display: none;
}
</style>
</head>

<body>

<div class="flash"></div>
<div class="mask"></div>

<!-- AUDIO : AUTOPLAY MUET (POLICY SAFE) -->
<audio id="voice" autoplay muted>
  <source src="anonymous-voice.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("voice");

// Déverrouillage au premier clic (comme TikTok)
document.addEventListener("click", () => {
  audio.muted = false;
  audio.play();
}, { once: true });
</script>

</body>
</html>

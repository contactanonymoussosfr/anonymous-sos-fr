<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: "Segoe UI", Arial, sans-serif; }

body {
  background: black;
  color: #e0ffe0;
  overflow: hidden;
}

/* ===== BACKGROUND CANVAS ===== */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* ===== OVERLAY ===== */
.overlay {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(2px);
}

/* ===== MAIN CARD ===== */
.card {
  background: rgba(0,0,0,0.75);
  border: 2px solid #00ff88;
  box-shadow: 0 0 40px #00ff88;
  padding: 40px;
  width: 380px;
  text-align: center;
  border-radius: 12px;
}

/* ===== MASK ===== */
.mask {
  width: 120px;
  height: 120px;
  margin: 0 auto 20px;
  border-radius: 50%;
  background: radial-gradient(circle at top, #00ffcc, #003322);
  box-shadow: 0 0 25px #00ffcc;
  animation: pulse 4s infinite ease-in-out;
}

@keyframes pulse {
  0% { box-shadow: 0 0 20px #00ffcc; }
  50% { box-shadow: 0 0 50px #00ffcc; }
  100% { box-shadow: 0 0 20px #00ffcc; }
}

/* ===== TEXT ===== */
h1 {
  color: #00ff88;
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  opacity: 0.85;
  margin-bottom: 20px;
}

/* ===== FORM ===== */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
  background: #111;
  color: #00ff88;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.btn-create {
  background: #007bff;
  color: white;
}

.btn-login {
  background: #00c853;
  color: black;
}

.status {
  margin-top: 12px;
  font-size: 13px;
  color: #ff6666;
}

/* ===== FOOTER ===== */
footer {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
  z-index: 2;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="overlay">
  <div class="card">
    <div class="mask"></div>
    <h1>Anonymous SOS FR</h1>
    <p>Plateforme communautaire inspirée des valeurs d’anonymat, de responsabilité et d’entraide.</p>

    <input type="email" placeholder="Adresse email">
    <input type="password" placeholder="Mot de passe">

    <button class="btn-create">Créer un compte</button>
    <button class="btn-login">Se connecter</button>

    <div class="status">Accès sécurisé</div>
  </div>
</div>

<footer>© Anonymous SOS FR — Tous droits réservés</footer>

<script>
/* ===== MATRIX BACKGROUND ===== */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&@";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for (let x = 0; x < columns; x++) drops[x] = Math.random() * canvas.height;

function drawMatrix() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters.charAt(Math.floor(Math.random() * letters.length));
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(drawMatrix, 50);

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>

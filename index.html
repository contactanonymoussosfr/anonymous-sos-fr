<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}
html,body{margin:0;height:100%;overflow:hidden;background:black;color:#eaffea}

/* ===== BACKGROUND MATRIX ===== */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* ===== OVERLAY ===== */
.overlay{
  position:relative;
  z-index:2;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(2px);
}

/* ===== CARD ===== */
.card{
  background:rgba(10,15,10,.85);
  border-radius:14px;
  padding:28px;
  width:340px;
  text-align:center;
  box-shadow:0 0 30px #00ff66;
  border:1px solid #00ff66;
}

h1{
  color:#00ff66;
  margin-bottom:6px;
}

p{font-size:13px;opacity:.9}

ul{
  text-align:left;
  font-size:13px;
  margin:15px 0;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.btn-create{background:#1976ff;color:white}
.btn-login{background:#00c853;color:black}

#status{
  margin-top:8px;
  font-size:13px;
  min-height:18px;
}

footer{
  margin-top:10px;
  font-size:11px;
  opacity:.6;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="overlay">
  <div class="card">
    <h1>Anonymous SOS FR</h1>
    <p>Plateforme communautaire indépendante et sécurisée</p>

    <ul>
      <li>Anonymat respecté</li>
      <li>Aucune haine, aucune violence</li>
      <li>Responsabilité individuelle</li>
      <li>Projet non officiel Anonymous</li>
    </ul>

    <input id="email" type="email" placeholder="Adresse email">
    <input id="password" type="password" placeholder="Mot de passe">

    <button class="btn-create" onclick="register()">Créer un compte</button>
    <button class="btn-login" onclick="login()">Se connecter</button>

    <div id="status"></div>

    <footer>© Anonymous SOS FR — Tous droits réservés</footer>
  </div>
</div>

<!-- 🔊 Son de bienvenue (optionnel) -->
<audio id="welcomeSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-start-222.mp3"></audio>

<!-- ===== FIREBASE ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.firebasestorage.app",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:ac31fc1073d9f858b2a02c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const status = document.getElementById("status");
const sound = document.getElementById("welcomeSound");

window.register = () => {
  status.textContent="Création du compte...";
  createUserWithEmailAndPassword(auth,email.value,password.value)
  .then(()=>{
    status.textContent="Compte créé avec succès ✔";
    sound.play();
  })
  .catch(e=>status.textContent=e.message);
};

window.login = () => {
  status.textContent="Connexion...";
  signInWithEmailAndPassword(auth,email.value,password.value)
  .then(()=>{
    status.textContent="Connexion réussie ✔";
    sound.play();
  })
  .catch(()=>status.textContent="Identifiants invalides");
};
</script>

<!-- ===== MATRIX EFFECT ===== -->
<script>
const c=document.getElementById("matrix"),ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
const letters="01ANONYMOUSSOSFR";
const size=14,cols=c.width/size;
const drops=Array(Math.floor(cols)).fill(1);

setInterval(()=>{
ctx.fillStyle="rgba(0,0,0,0.1)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#00ff66";
ctx.font=size+"px monospace";
drops.forEach((y,i)=>{
const text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*size,y*size);
drops[i]=y*size>c.height&&Math.random()>0.975?0:y+1;
});
},33);

onresize=()=>{c.width=innerWidth;c.height=innerHeight;}
</script>

</body>
</html>

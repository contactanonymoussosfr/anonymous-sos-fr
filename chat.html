<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat – Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{
  margin:0;
  background:black;
  color:#00ff66;
  height:100vh;
  overflow:hidden;
}
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* LAYOUT */
.app{
  position:relative;
  z-index:2;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#001a0f;
  border-right:1px solid #00ff66;
  padding:10px;
  overflow-y:auto;
}
.sidebar h2{
  font-size:16px;
  margin-bottom:10px;
  text-align:center;
}
.user{
  padding:6px;
  border-bottom:1px solid #003d22;
  font-size:13px;
}
.admin{color:#ff4444;font-weight:bold}
.modo{color:#ffaa00;font-weight:bold}
.member{color:#00ff66}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}
.messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
}
.msg{
  margin-bottom:8px;
  font-size:14px;
}
.msg span{
  opacity:.7;
  font-size:11px;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  border-top:1px solid #00ff66;
  background:#001a0f;
}
input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
}
button{
  margin-left:10px;
  padding:10px 18px;
  border:none;
  border-radius:6px;
  background:#00ff66;
  font-weight:bold;
  cursor:pointer;
}
footer{
  font-size:11px;
  opacity:.5;
  text-align:center;
  padding:5px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Connectés</h2>
    <div id="users"></div>
  </div>

  <!-- CHAT -->
  <div class="chat">
    <div class="messages" id="messages"></div>

    <div class="input">
      <input id="message" placeholder="Écrire un message…" autocomplete="off">
      <button onclick="sendMessage()">Envoyer</button>
    </div>

    <footer>Chat communautaire sécurisé – Anonymous SOS FR</footer>
  </div>

</div>

<script type="module">
/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  serverTimestamp,
  setDoc,
  doc
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.appspot.com",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:ac31fc1073d9f858b2a02c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= USER ================= */
let currentUser;
let role = "member"; // admin | modo | member

onAuthStateChanged(auth, user=>{
  if(!user) location.href="index.html";
  currentUser = user;

  // 🔴 ADMIN MANUEL (ton compte)
  if(user.email === "despeschez@gmail.com"){
    role = "admin";
  }

  setDoc(doc(db,"users",user.uid),{
    email:user.email,
    role:role,
    online:true,
    time:serverTimestamp()
  });
});

/* ================= USERS LIST ================= */
onSnapshot(collection(db,"users"), snap=>{
  const box = document.getElementById("users");
  box.innerHTML="";
  snap.forEach(d=>{
    const u=d.data();
    const div=document.createElement("div");
    div.className="user "+u.role;
    div.textContent=u.email+" ("+u.role+")";
    box.appendChild(div);
  });
});

/* ================= CHAT ================= */
function sendMessage(){
  const input=document.getElementById("message");
  if(!input.value.trim())return;

  addDoc(collection(db,"messages"),{
    text:input.value,
    user:currentUser.email,
    role:role,
    time:serverTimestamp()
  });

  input.value="";
}

onSnapshot(collection(db,"messages"), snap=>{
  const box=document.getElementById("messages");
  box.innerHTML="";
  snap.docs.sort((a,b)=>a.data().time?.seconds-b.data().time?.seconds);
  snap.forEach(d=>{
    const m=d.data();
    const div=document.createElement("div");
    div.className="msg";
    div.innerHTML=<b class="${m.role}">${m.user}</b> : ${m.text}<br><span>${m.role}</span>;
    box.appendChild(div);
  });
  box.scrollTop=box.scrollHeight;
});

/* ================= MATRIX ================= */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;
const letters="01";
const font=14;
const cols=canvas.width/font;
const drops=Array(Math.floor(cols)).fill(1);

setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#00ff66";
  ctx.font=font+"px monospace";
  for(let i=0;i<drops.length;i++){
    const t=letters[Math.floor(Math.random()*2)];
    ctx.fillText(t,i*font,drops[i]*font);
    if(drops[i]*font>canvas.height&&Math.random()>0.975)drops[i]=0;
    drops[i]++;
  }
},33);
</script>

</body>
</html>

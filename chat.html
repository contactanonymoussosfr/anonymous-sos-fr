<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat – Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  font-family: Arial, sans-serif;
  color: #00ff66;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

#app {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 220px 1fr;
  height: 100%;
}

#users {
  border-right: 2px solid #00ff66;
  padding: 10px;
  overflow-y: auto;
}

#users h3 {
  margin-top: 0;
}

#chat {
  display: flex;
  flex-direction: column;
  height: 100%;
}

#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.message {
  margin-bottom: 10px;
}

.name {
  font-weight: bold;
}

.admin {
  color: red;
}

#send {
  display: flex;
  border-top: 2px solid #00ff66;
}

#send input {
  flex: 1;
  padding: 12px;
  background: black;
  border: none;
  color: #00ff66;
  font-size: 16px;
}

#send button {
  background: #00ff66;
  border: none;
  padding: 12px 20px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="app">
  <div id="users">
    <h3>Connectés</h3>
    <div id="userList"></div>
  </div>

  <div id="chat">
    <div id="messages"></div>

    <div id="send">
      <input id="text" placeholder="Écrire un message…" />
      <button onclick="sendMessage()">Envoyer</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = "connexion.html";
  } else {
    currentUser = user;
  }
});

window.sendMessage = async function () {
  const input = document.getElementById("text");
  if (!input.value.trim()) return;

  await addDoc(collection(db, "messages"), {
    uid: currentUser.uid,
    email: currentUser.email,
    role: currentUser.email === "despeschez@gmail.com" ? "admin" : "member",
    text: input.value,
    created: serverTimestamp()
  });

  input.value = "";
};

const q = query(collection(db, "messages"), orderBy("created"));
onSnapshot(q, snap => {
  const box = document.getElementById("messages");
  box.innerHTML = "";

  snap.forEach(doc => {
    const m = doc.data();
    const div = document.createElement("div");
    div.className = "message";

    const name = document.createElement("span");
    name.className = "name " + (m.role === "admin" ? "admin" : "");
    name.textContent = m.email + " : ";

    div.appendChild(name);
    div.append(m.text);
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});
</script>

<script>
const c = document.getElementById("matrix");
const ctx = c.getContext("2d");
c.width = window.innerWidth;
c.height = window.innerHeight;

const letters = "01";
const font = 14;
const cols = c.width / font;
const drops = Array.from({length: cols}).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle = "#00ff66";
  ctx.font = font + "px monospace";

  drops.forEach((y, i) => {
    const t = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(t, i*font, y*font);
    drops[i] = y*font > c.height && Math.random() > 0.975 ? 0 : y+1;
  });
}
setInterval(draw, 33);
</script>

</body>
</html>

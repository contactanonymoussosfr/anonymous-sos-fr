<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat – Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* APP */
#app {
  position: relative;
  z-index: 10;
  display: grid;
  grid-template-columns: 220px 1fr;
  height: 100%;
}

/* USERS */
#users {
  background: rgba(0,0,0,0.85);
  border-right: 2px solid #00ff66;
  padding: 10px;
  color: #00ff66;
}

#users h3 {
  margin-top: 0;
}

/* CHAT */
#chat {
  display: flex;
  flex-direction: column;
  background: rgba(0,0,0,0.85);
}

/* MESSAGES */
#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  color: #00ff66;
  font-size: 15px;
}

.message {
  margin-bottom: 8px;
}

.name {
  font-weight: bold;
}

.admin {
  color: red;
}

/* SEND */
#send {
  display: flex;
  border-top: 2px solid #00ff66;
}

#send input {
  flex: 1;
  padding: 12px;
  background: black;
  border: none;
  color: #00ff66;
  font-size: 16px;
  outline: none;
}

#send button {
  background: #00ff66;
  border: none;
  padding: 12px 20px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="app">
  <div id="users">
    <h3>Connectés</h3>
    <div id="userList"></div>
  </div>

  <div id="chat">
    <div id="messages"></div>

    <div id="send">
      <input id="text" placeholder="Écrire un message…" />
      <button onclick="sendMessage()">Envoyer</button>
    </div>
  </div>
</div>

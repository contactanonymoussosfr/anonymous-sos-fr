<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat Vocal – Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  color:#00ff66;
  font-family:Arial, Helvetica, sans-serif;
  overflow:hidden;
}
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}
.overlay{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  width:380px;
  background:#001a0f;
  border-radius:14px;
  padding:20px;
  box-shadow:0 0 30px #00ff66;
  border:1px solid #00ff66;
  text-align:center;
}
h1{
  margin-bottom:10px;
  text-shadow:0 0 10px #00ff66;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}
.btn-start{background:#00c853;color:black;}
.btn-stop{background:#ff4444;color:white;}
footer{
  margin-top:12px;
  font-size:11px;
  opacity:.6;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="overlay">
  <div class="card">
    <h1>🎤 Chat Vocal</h1>
    <p>Anonymous SOS FR</p>

    <button class="btn-start" onclick="startVoice()">🎧 Activer le micro</button>
    <button class="btn-stop" onclick="stopVoice()">⛔ Couper le micro</button>

    <footer>Chat vocal communautaire sécurisé</footer>
  </div>
</div>

<script type="module">
/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.appspot.com",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:ac31fc1073d9f858b2a02c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let localStream;
let peers = {};
let myId;

/* ================= AUTH ================= */
signInAnonymously(auth).then(res=>{
  myId = res.user.uid;
});

/* ================= VOICE ================= */
async function startVoice(){
  localStream = await navigator.mediaDevices.getUserMedia({audio:true});
  const callRef = collection(db, "voice");

  await addDoc(callRef, { user: myId });

  onSnapshot(callRef, snapshot=>{
    snapshot.docChanges().forEach(change=>{
      const data = change.doc.data();
      const id = change.doc.id;

      if(data.user !== myId && !peers[id]){
        createPeer(id);
      }
    });
  });
}

function stopVoice(){
  localStream?.getTracks().forEach(t=>t.stop());
  Object.values(peers).forEach(p=>p.close());
  peers = {};
}

/* ================= WEBRTC ================= */
function createPeer(id){
  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  localStream.getTracks().forEach(track=>pc.addTrack(track, localStream));

  pc.ontrack = e=>{
    const audio = document.createElement("audio");
    audio.srcObject = e.streams[0];
    audio.autoplay = true;
    document.body.appendChild(audio);
  };

  peers[id] = pc;
}

/* ================= MATRIX EFFECT ================= */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#00ff66";
  ctx.font=fontSize+"px monospace";
  for(let i=0;i<drops.length;i++){
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);
    if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  }
}
setInterval(draw,33);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  color: #aaffaa;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}

canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

#app {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 220px 1fr 220px;
  height: 100vh;
}

.panel {
  border-right: 1px solid #00ff66;
  padding: 10px;
  overflow-y: auto;
}

.panel.right {
  border-right: none;
  border-left: 1px solid #00ff66;
}

#chat {
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.message {
  margin-bottom: 8px;
}

.user {
  color: #00ff66;
  font-weight: bold;
}

.input-zone {
  display: flex;
  border-top: 1px solid #00ff66;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

button {
  padding: 10px 20px;
  border: none;
  background: #00ff66;
  color: black;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="app">

  <div class="panel">
    <h3>Connectés</h3>
    <div>• Membre</div>
    <div>• Modérateur</div>
    <div>• Admin</div>
  </div>

  <div id="chat">
    <h2 style="text-align:center;">Chat Anonymous SOS FR</h2>
    <div id="messages"></div>

    <div class="input-zone">
      <input id="messageInput" placeholder="Écrire un message..." />
      <button onclick="sendMessage()">Envoyer</button>
    </div>
  </div>

  <div class="panel right">
    <h3>Modération</h3>
    <div>✔ Surveillance active</div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
  storageBucket: "anonymous-sos-fr.appspot.com",
  messagingSenderId: "490705618757",
  appId: "1:490705618757:web:ac31fc1073d9f858b2a02c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const messagesRef = collection(db, "messages");
const messagesBox = document.getElementById("messages");

window.sendMessage = async () => {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if (text === "") return;

  await addDoc(messagesRef, {
    user: "Anonyme",
    text: text,
    createdAt: serverTimestamp()
  });

  input.value = "";
};

const q = query(messagesRef, orderBy("createdAt"));
onSnapshot(q, (snapshot) => {
  messagesBox.innerHTML = "";
  snapshot.forEach(doc => {
    const msg = doc.data();
    const div = document.createElement("div");
    div.className = "message";
    div.innerHTML = <span class="user">${msg.user} :</span> ${msg.text};
    messagesBox.appendChild(div);
  });
  messagesBox.scrollTop = messagesBox.scrollHeight;
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat – Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
body{
  background:black;
  color:#aaffaa;
  height:100vh;
  overflow:hidden;
}
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}
#app{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:260px 1fr;
  height:100vh;
}
#users{
  border-right:2px solid #00ff66;
  padding:10px;
}
#users h3{
  text-align:center;
  margin-bottom:10px;
  color:#00ff66;
}
.user{
  margin:6px 0;
}
.admin{color:red}
.modo{color:orange}
.member{color:#aaffaa}

#chat{
  display:flex;
  flex-direction:column;
}
#header{
  padding:10px;
  text-align:center;
  border-bottom:2px solid #00ff66;
  color:#00ff66;
}
#messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
}
.msg{
  margin-bottom:8px;
}
#input{
  display:flex;
  border-top:2px solid #00ff66;
}
#input input{
  flex:1;
  padding:12px;
  border:none;
}
#input button{
  padding:12px 20px;
  border:none;
  background:#00ff66;
  font-weight:bold;
  cursor:pointer;
}
footer{
  text-align:center;
  font-size:11px;
  opacity:.6;
  margin-top:5px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="app">
  <div id="users">
    <h3>Connectés</h3>
    <div id="userList"></div>
  </div>

  <div id="chat">
    <div id="header">Chat communautaire – Anonymous SOS FR</div>
    <div id="messages"></div>

    <div id="input">
      <input id="msg" placeholder="Écrire un message…">
      <button onclick="send()">Envoyer</button>
    </div>

    <footer>Chat sécurisé – Messages écrits uniquement</footer>
  </div>
</div>

<script type="module">
/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, setDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCONPdgpoKjPnW7Bv_iFo1K7BkdctXFJGQ",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let CURRENT_USER = null;
let ROLE = "member";

/* ================= AUTH ================= */
onAuthStateChanged(auth, user=>{
  if(!user){
    location.href="index.html";
    return;
  }
  CURRENT_USER = user.email;

  ROLE = CURRENT_USER === "despeschez@gmail.com" ? "admin" : "member";

  setDoc(doc(db,"online",CURRENT_USER),{
    email:CURRENT_USER,
    role:ROLE,
    time:serverTimestamp()
  });

  loadChat();
  loadUsers();

  window.addEventListener("beforeunload",()=>{
    deleteDoc(doc(db,"online",CURRENT_USER));
  });
});

/* ================= CHAT ================= */
function loadChat(){
  const q = query(collection(db,"messages"), orderBy("time","asc"));
  onSnapshot(q,snap=>{
    const box=document.getElementById("messages");
    box.innerHTML="";
    snap.forEach(d=>{
      const m=d.data();
      const div=document.createElement("div");
      div.className="msg";
      div.innerHTML=<b class="${m.role}">${m.user}</b> : ${m.text};
      box.appendChild(div);
    });
    box.scrollTop=box.scrollHeight;
  });
}

window.send = async ()=>{
  const input=document.getElementById("msg");
  if(!input.value.trim()) return;

  await addDoc(collection(db,"messages"),{
    user:CURRENT_USER,
    role:ROLE,
    text:input.value,
    time:serverTimestamp()
  });
  input.value="";
};

/* ================= USERS ================= */
function loadUsers(){
  onSnapshot(collection(db,"online"),snap=>{
    const box=document.getElementById("userList");
    box.innerHTML="";
    snap.forEach(d=>{
      const u=d.data();
      const div=document.createElement("div");
      div.className="user "+u.role;
      div.textContent=u.email+" ("+u.role+")";
      box.appendChild(div);
    });
  });
}

/* ================= MATRIX ================= */
const c=document.getElementById("matrix"),ctx=c.getContext("2d");
function resize(){c.width=innerWidth;c.height=innerHeight}
window.onresize=resize;resize();
const letters="01";const f=16;
let cols=c.width/f;let drops=Array(cols).

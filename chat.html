<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat – Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:black;color:#aaffaa;height:100vh;overflow:hidden}

/* MATRIX */
canvas{position:fixed;inset:0;z-index:0}

/* LAYOUT */
.app{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:240px 1fr;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  border-right:2px solid #00ff66;
  padding:10px;
}
.sidebar h3{
  color:#00ff66;
  margin-bottom:10px;
}
.user{
  font-size:13px;
  margin-bottom:6px;
}
.admin{color:#ff4444}

/* CHAT */
.chat{
  display:flex;
  flex-direction:column;
}
.messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
}
.msg{
  margin-bottom:8px;
  font-size:14px;
}
.msg span{
  font-weight:bold;
}
.admin-tag{color:#ff4444}
.member-tag{color:#00ff66}

/* INPUT */
.input-zone{
  display:flex;
  border-top:2px solid #00ff66;
}
input{
  flex:1;
  padding:12px;
  background:#111;
  border:none;
  color:#aaffaa;
}
button{
  padding:12px 20px;
  background:#00ff66;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
footer{
  text-align:center;
  font-size:11px;
  opacity:.6;
  padding:4px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="app">
  <div class="sidebar">
    <h3>Connectés</h3>
    <div id="users"></div>
  </div>

  <div class="chat">
    <div class="messages" id="messages"></div>

    <div class="input-zone">
      <input id="messageInput" placeholder="Écrire un message…">
      <button onclick="sendMessage()">Envoyer</button>
    </div>

    <footer>Chat communautaire sécurisé – Anonymous SOS FR</footer>
  </div>
</div>

<script type="module">
/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, setDoc, doc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TA_CLE_API",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser;
let anonId;

/* ================= AUTH ================= */
onAuthStateChanged(auth, user => {
  if(!user){
    window.location.href="connexion.html";
    return;
  }
  currentUser = user;
  anonId = "Anon-" + user.uid.substring(0,5).toUpperCase();

  setDoc(doc(db,"users",user.uid),{
    anonId: anonId,
    role: user.email === "despeschez@gmail.com" ? "admin" : "member",
    online:true,
    last:serverTimestamp()
  });
});

/* ================= SEND ================= */
window.sendMessage = async () => {
  const input = document.getElementById("messageInput");
  if(input.value.trim()==="") return;

  await addDoc(collection(db,"messages"),{
    anonId: anonId,
    role: currentUser.email === "despeschez@gmail.com" ? "admin" : "member",
    text: input.value,
    created: serverTimestamp()
  });

  input.value="";
};

/* ================= RECEIVE ================= */
const q = query(collection(db,"messages"), orderBy("created"));
onSnapshot(q,snap=>{
  const box = document.getElementById("messages");
  box.innerHTML="";
  snap.forEach(d=>{
    const m=d.data();
    const div=document.createElement("div");
    div.className="msg";
    div.innerHTML=`
      <span class="${m.role==="admin"?"admin-tag":"member-tag"}">
        ${m.anonId}
      </span> : ${m.text}
    `;
    box.appendChild(div);
  });
  box.scrollTop=box.scrollHeight;
});

/* ================= USERS ================= */
onSnapshot(collection(db,"users"),snap=>{
  const u=document.getElementById("users");
  u.innerHTML="";
  snap.forEach(d=>{
    const x=d.data();
    const div=document.createElement("div");
    div.className="user "+(x.role==="admin"?"admin":"");
    div.textContent = x.anonId + (x.role==="admin"?" (ADMIN)":"");
    u.appendChild(div);
  });
});

/* ================= MATRIX ================= */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;
const letters="01";
const font=14;
const cols=c.width/font;
const drops=Array(cols).fill(1);
setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ff66";
  ctx.font=font+"px monospace";
  drops.forEach((y,i)=>{
    const t=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(t,i*font,y*font);
    if(y*font>c.height&&Math.random()>0.95)drops[i]=0;
    drops[i]++;
  });
},33);
</script>

</body>
</html>

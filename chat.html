<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat — Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{
  background:black;
  color:#00ff66;
  height:100vh;
  overflow:hidden;
}

/* MATRIX BACKGROUND */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* LAYOUT */
#container{
  position:relative;
  z-index:1;
  display:flex;
  height:100vh;
}

/* CONNECTÉS */
#users{
  width:220px;
  border-right:2px solid #00ff66;
  padding:10px;
}
#users h3{
  margin-bottom:10px;
}
.user{
  font-size:13px;
  margin-bottom:4px;
}

/* CHAT */
#chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

#messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.msg{
  margin-bottom:6px;
  font-size:14px;
}

#inputBar{
  display:flex;
  border-top:2px solid #00ff66;
}

#message{
  flex:1;
  padding:12px;
  background:black;
  border:none;
  color:#00ff66;
  outline:none;
}

button{
  padding:12px 18px;
  background:#00ff66;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="container">
  <div id="users">
    <h3>Connectés</h3>
    <div id="userList"></div>
  </div>

  <div id="chat">
    <div id="messages"></div>

    <div id="inputBar">
      <input id="message" placeholder="Écrire un message..." autocomplete="off">
      <button onclick="sendMessage()">Envoyer</button>
    </div>
  </div>
</div>

<script type="module">
/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, setDoc, doc } 
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "TA_CLE_API",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ELEMENTS */
const messagesDiv = document.getElementById("messages");
const userList = document.getElementById("userList");
const input = document.getElementById("message");

let myId = null;

/* AUTH CHECK */
onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = "connexion.html";
    return;
  }

  myId = "User-" + user.uid.substring(0,6);

  // présence
  setDoc(doc(db,"online",user.uid),{
    user: myId,
    online: true
  });

  // messages temps réel
  const q = query(collection(db,"messages"), orderBy("createdAt"));
  onSnapshot(q, snap => {
    messagesDiv.innerHTML="";
    snap.forEach(d=>{
      const m = d.data();
      const div = document.createElement("div");
      div.className="msg";
      div.textContent = m.user+" : "+m.text;
      messagesDiv.appendChild(div);
    });
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });

  // connectés temps réel
  onSnapshot(collection(db,"online"), snap=>{
    userList.innerHTML="";
    snap.forEach(d=>{
      const u=document.createElement("div");
      u.className="user";
      u.textContent=d.data().user;
      userList.appendChild(u);
    });
  });
});

/* SEND MESSAGE */
window.sendMessage = async function(){
  if(input.value.trim()==="") return;

  await addDoc(collection(db,"messages"),{
    user: myId,
    text: input.value,
    createdAt: serverTimestamp()
  });

  input.value="";
};

/* MATRIX EFFECT */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
const letters="01";
const font=14;
const cols=canvas.width/font;
const drops=Array(cols).fill(1);

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#00ff66";
  ctx.font=font+"px monospace";
  for(let i=0;i<drops.length;i++){
    const text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*font,drops[i]*font);
    if(drops[i]*font>canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  }
}
setInterval(draw,35);
</script>

</body>
</html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pubs – Anonymous SOS FR</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #4a0000, #120000);
    color:#fff;
}

/* HEADER */
header{
    background:#7a0000;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
header button{
    background:#ff2b2b;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    color:#fff;
    cursor:pointer;
}
header button:hover{opacity:0.8;}

/* CONTAINER */
.container{
    max-width:1000px;
    margin:30px auto;
    padding:20px;
}

/* TITRES */
h1{text-align:center;}
.subtitle{text-align:center;color:#ccc;margin-bottom:30px;}

/* PUB CARDS */
.ads-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.ad-card{
    border:1px solid #ff2b2b;
    border-radius:10px;
    padding:15px;
    background:rgba(0,0,0,0.4);
}

.ad-card h3{margin:0 0 10px 0;}
.ad-card video{
    width:100%;
    border-radius:8px;
}

.ad-card button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#555;
    color:#aaa;
    cursor:not-allowed;
}

.ad-card button.active{
    background:#00c853;
    color:#000;
    cursor:pointer;
}

/* SCORE */
.score-box{
    margin-top:40px;
    border:1px solid #ff2b2b;
    border-radius:10px;
    padding:20px;
    text-align:center;
}

.score{
    font-size:32px;
    color:#00e676;
}
</style>
</head>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gagner des pièces</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  background:#000;
  color:#00ff66;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  border:2px solid #00ff66;
  padding:30px;
  max-width:400px;
  text-align:center;
}
button{
  margin-top:20px;
  padding:15px;
  width:100%;
  background:#00ff66;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
button:disabled{
  background:#333;
  cursor:not-allowed;
}
.timer{
  margin-top:15px;
  font-size:14px;
}
</style>
</head>
<body>

<div class="box">
  <h2>📺 Regarder une pub</h2>
  <p>Regarde une pub pour gagner <b>10 pièces</b>.</p>

  <button id="watchBtn" onclick="watchAd()">▶️ Regarder la pub</button>
  <div class="timer" id="timer"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, doc, updateDoc, increment, addDoc, collection, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

/* 🔧 METS TA CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "TA_CLE_API",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
const btn = document.getElementById("watchBtn");
const timerEl = document.getElementById("timer");

onAuthStateChanged(auth, user => {
  if(!user){
    window.location.href="connexion.html";
    return;
  }
  currentUser = user;
});

window.watchAd = async function(){
  btn.disabled = true;
  let time = 10;
  timerEl.innerText = "Pub en cours : " + time + "s";

  const interval = setInterval(()=>{
    time--;
    timerEl.innerText = "Pub en cours : " + time + "s";
    if(time <= 0){
      clearInterval(interval);
      reward();
    }
  },1000);
}

async function reward(){
  const uid = currentUser.uid;

  await updateDoc(doc(db,"users",uid),{
    coins: increment(10)
  });

  await addDoc(collection(db,"ads_logs"),{
    uid: uid,
    reward: 10,
    createdAt: serverTimestamp()
  });

  timerEl.innerText = "✅ +10 pièces gagnées";
  btn.disabled = false;
}
</script>

</body>
</html>

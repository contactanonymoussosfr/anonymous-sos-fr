,<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Pubs rémunérées – Anonymous SOS FR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #0f0;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 40px auto;
      background: rgba(0,0,0,0.85);
      border: 2px solid #0f0;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 25px #0f0;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      font-size: 14px;
      opacity: 0.9;
    }

    .ads {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
      margin-top: 25px;
    }

    .ad {
      border: 1px solid #0f0;
      border-radius: 8px;
      padding: 15px;
      background: rgba(0,0,0,0.9);
      text-align: center;
    }

    .ad h3 {
      margin: 5px 0;
      font-size: 16px;
    }

    .ad p {
      font-size: 13px;
    }

    .ad button {
      margin-top: 10px;
      padding: 8px;
      width: 100%;
      background: #0f0;
      color: #000;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
    }

    .ad button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    footer {
      text-align: center;
      font-size: 12px;
      margin-top: 20px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import {
  getFirestore, collection, getDocs,
  doc, updateDoc, increment,
  addDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

/* 🔧 TA CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "TA_CLE_API",
  authDomain: "anonymous-sos-fr.firebaseapp.com",
  projectId: "anonymous-sos-fr"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const adsList = document.getElementById("adsList");
let currentUser = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "connexion.html";
    return;
  }

  currentUser = user;
  loadAds();
});

async function loadAds() {
  adsList.innerHTML = "";
  const snap = await getDocs(collection(db, "ads"));

  snap.forEach(docSnap => {
    const ad = docSnap.data();
    if (!ad.active) return;

    const div = document.createElement("div");
    div.className = "ad";

    div.innerHTML = `
      <h3>${ad.title}</h3>
      <p>${ad.description}</p>
      <p><strong>Gain :</strong> ${ad.reward} crédits</p>
      <button>▶️ Regarder</button>
      <div class="timer"></div>
    `;

    const btn = div.querySelector("button");
    const timerEl = div.querySelector(".timer");

    btn.onclick = () => watchAd(ad, docSnap.id, btn, timerEl);
    adsList.appendChild(div);
  });
}

function watchAd(ad, adId, btn, timerEl) {
  btn.disabled = true;
  let time = 60;
  timerEl.innerText = "⏱️ Pub en cours : 60s";

  const interval = setInterval(async () => {
    time--;
    timerEl.innerText = "⏱️ Pub en cours : " + time + "s";

    if (time <= 0) {
      clearInterval(interval);
      await rewardUser(ad, adId);
      timerEl.innerText = "✅ Crédits ajoutés";
      btn.innerText = "✔ Déjà vue";
    }
  }, 1000);
}

async function rewardUser(ad, adId) {
  const uid = currentUser.uid;

  await updateDoc(doc(db, "users", uid), {
    credits: increment(ad.reward)
  });

  await addDoc(collection(db, "ads_history"), {
    uid: uid,
    adId: adId,
    reward: ad.reward,
    createdAt: serverTimestamp()
  });
}
</script>

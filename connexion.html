<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion - Anonymous SOS FR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: #111;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 0 15px rgba(255,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: red;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
    a {
      display: block;
      text-align: center;
      margin-top: 12px;
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Connexion</h1>

  <input type="text" placeholder="Email ou pseudo">
  <input type="password" placeholder="Mot de passe">

  <button>Se connecter</button>

  <a href="inscription.html">Créer un compte</a>
  <a href="index.html">← Retour à l'accueil</a>
</div>

</body>
</html>

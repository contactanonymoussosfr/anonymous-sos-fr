<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion TEST</title>

<body style="background:black;color:white;text-align:center">

<h2>Connexion TEST</h2>

<input id="u" placeholder="Pseudo"><br><br>
<button onclick="go()">SE CONNECTER</button>

}
</script>

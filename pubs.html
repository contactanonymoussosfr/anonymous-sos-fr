<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anonymous SOS FR – Vidéos TikTok</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: radial-gradient(circle at top, #5a0000, #120000);
  color:#fff;
}

header{
  padding:20px;
  border-bottom:1px solid #ff2a2a;
  font-size:18px;
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#ff3b3b;
}

.info{
  border:1px solid #ff2a2a;
  padding:15px;
  border-radius:10px;
  margin-bottom:30px;
}

.card{
  border:1px solid #ff2a2a;
  border-radius:15px;
  padding:20px;
  margin-top:30px;
  text-align:center;
}
</style>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if(!user || !user.connected){
  alert("Vous devez être connecté pour accéder aux vidéos.");
  window.location.href="connexion.html";
}
</script>

</head>
<body>

<header>
  Anonymous SOS FR
</header>

<div class="container">

<h1>Vidéos TikTok Officielles</h1>

<div class="info">
✔ Vous êtes sur le site officiel Anonymous SOS FR 🔵<br>
✔ Nous sommes légion, nous ne pardonnons pas<br>
✔ N’hésitez pas à inviter du monde
</div>

<div class="card">
  <h2>Vidéo officielle TikTok</h2>

  <!-- EMBED OFFICIEL TIKTOK -->
  <blockquote class="tiktok-embed"
    cite="https://www.tiktok.com/@anonymous_sos_fr/video/NRkHRaG6"
    data-video-id="NRkHRaG6"
    style="max-width: 605px;min-width: 325px;">

  Vous êtes chez vous.<br>

</div>

</body>
</html>

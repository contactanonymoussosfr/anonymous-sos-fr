<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Live — Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:#fff;
  font-family:Arial, sans-serif;
}

/* HEADER */
header{
  background:#8b0000;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

/* USER INFO */
#userInfo{
  text-align:center;
  margin:10px;
  font-size:14px;
  color:#7CFC00;
}

/* LIVE CONTAINER */
#liveContainer{
  position:relative;
  width:100%;
  max-width:420px;
  margin:20px auto;
  background:black;
  border-radius:15px;
  overflow:hidden;
}

/* VIDEO */
video{
  width:100%;
  height:75vh;
  object-fit:cover;
  background:black;
}

/* OVERLAY BUTTONS */
.overlay{
  position:absolute;
  right:10px;
  bottom:80px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn{
  background:#111;
  border:1px solid red;
  color:white;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
}

.btn:hover{
  background:red;
}

/* BOTTOM BAR */
.bottomBar{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.bottomBar button{
  background:#8b0000;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

/* SOS FLOAT */
#sosBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:red;
  color:white;
  padding:14px;
  border-radius:50%;
  font-weight:bold;
  box-shadow:0 0 10px red;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  🔴 LIVE — Anonymous SOS FR
</header>

<div id="userInfo">
  Chargement utilisateur...
</div>

<div id="liveContainer">

  <!-- VIDEO LIVE (démo caméra locale) -->
  <video id="liveVideo" autoplay muted></video>

  <!-- OVERLAY ACTIONS -->
  <div class="overlay">
    <div class="btn" onclick="openGifts()">🎁</div>
    <div class="btn" onclick="likeLive()">❤️</div>
    <div class="btn" onclick="shareLive()">🔁</div>
  </div>

  <!-- BOTTOM ACTIONS -->
  <div class="bottomBar">
    <button onclick="openChat()">💬 Chat</button>
    <button onclick="openClassement()">🏆 Classement</button>
  </div>
</div>

<!-- SOS BUTTON -->
<div id="sosBtn" onclick="openSOS()">SOS</div>

<script>
/* ===== AUTH CHECK ===== */
const user = localStorage.getItem("userID");
const gender = localStorage.getItem("gender");

if(!user){
  alert("Accès réservé aux membres connectés");
  window.location.href = "connexion.html";
}else{
  document.getElementById("userInfo").innerText =
    "Connecté : " + user + " (" + gender + ")";
}

/* ===== CAMERA LIVE DEMO ===== */
navigator.mediaDevices.getUserMedia({ video:true, audio:true })
.then(stream=>{
  document.getElementById("liveVideo").srcObject = stream;
})
.catch(()=>{
  alert("Caméra non autorisée");
});

/* ===== ACTIONS ===== */
function openGifts(){
  window.location.href = "gifts.html";
}

function openChat(){
  window.location.href = "chat.html";
}

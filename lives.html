<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Live – Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial,sans-serif;
}

#liveContainer{
  position:relative;
  width:100vw;
  height:100vh;
  background:black;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

#overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

#giftAnimation{
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:60px;
  display:none;
  text-align:center;
}

#controls{
  position:absolute;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  pointer-events:auto;
}

button{
  padding:10px 15px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#ff3333;
  color:white;
}
</style>
</head>

<body>

<script>
const currentUser = localStorage.getItem("currentUser");
if(!currentUser){
  alert("Connecte-toi pour accéder au live");
  window.location.href="login.html";
}
</script>

<div id="liveContainer">

  <!-- VIDEO LIVE (caméra) -->
  <video id="video" autoplay muted></video>

  <!-- OVERLAY CADEAUX -->
  <div id="overlay">
    <div id="giftAnimation"></div>
  </div>

  <!-- BOUTONS TEST -->
  <div id="controls">
    <button onclick="sendGift('❤️','Cœur')">❤️</button>
    <button onclick="sendGift('🦁','Lion Ultime')">🦁</button>
    <button onclick="sendGift('🕶️','Anonymous – Jugement')">🕶️</button>
  </div>

</div>

<script>
// 🎥 CAMÉRA
navigator.mediaDevices.getUserMedia({video:true,audio:true})
.then(stream=>{
  document.getElementById("video").srcObject = stream;
})
.catch(()=>{
  alert("Autorise la caméra");
});

// 🎁 ANIMATION CADEAU
function sendGift(icon,name){
  const box = document.getElementById("giftAnimation");
  box.innerHTML = icon + "<br>" + name;
  box.style.display="block";

  let duration = 3000;
  if(name.includes("Lion") || name.includes("Jugement")){
    duration = 30000;
  }

  setTimeout(()=>{
    box.style.display="none";
  },duration);
}
</script>

</body>
</html>

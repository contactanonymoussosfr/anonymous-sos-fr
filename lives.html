<!DOCTYPE html>
<html>
<body>

<h2>Lives en cours</h2>
<button onclick="start()">Démarrer</button>
<button onclick="stop()">Arrêter</button>

<div id="list"></div>

<script src="firebase.js" type="module"></script>
<script type="module">
import { doc, updateDoc, collection, query, where, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const uid = localStorage.getItem("uid");
if(!uid) location.href="connexion.html";

const myRef = doc(db,"users",uid);

window.start = ()=> updateDoc(myRef,{live:true});
window.stop = ()=> updateDoc(myRef,{live:false});

const q = query(collection(db,"users"),where("live","==",true));
onSnapshot(q,(snap)=>{
  list.innerHTML="";
  snap.forEach(d=>{
    list.innerHTML += "<p>🔴 "+d.data().id+"</p>";
  });
});
</script>

</body>
</html>

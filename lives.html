<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lives</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:Arial">

<script>
// 🔒 PROTECTION
if(!localStorage.getItem("user")){
  window.location.href = "connexion.html";
}
</script>

<h2>LIVES</h2>

<button onclick="start()">▶️ Démarrer le live</button>
<button onclick="stop()">⏹️ Arrêter le live</button>

<p id="status"></p>

<br>

<a href="feed.html" style="color:red">
⬅️ Retour au feed
</a>

<script>
function start(){
  document.getElementById("status").innerText = "🔴 LIVE EN COURS";
}
function stop(){
  document.getElementById("status").innerText = "⏹️ LIVE ARRÊTÉ";
}
</script>

</body>
</html>

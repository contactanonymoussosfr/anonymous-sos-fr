<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Lives</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body onload="requireAuth()">

<header>
  <nav>
    <a href="index.html">Feed</a>
    <a href="lives.html">Lives</a>
    <a href="member.html">Profil</a>
    <a href="#" onclick="logout()">Quitter</a>
  </nav>
</header>

<div class="container">
  <h2 class="page-title">Lives</h2>

  <p style="font-size:14px;opacity:0.8;">
    Section live (version simulation, sans serveur).
  </p>

  <div class="live-box" id="liveBox">
    LIVE OFF
  </div>

  <button onclick="toggleLive()">Lancer / Arrêter le live</button>
</div>

<script src="app.js"></script>
<script>
  // Live local (simulation)
  let live = false;

  function toggleLive() {
    live = !live;
    document.getElementById("liveBox").textContent = live ? "LIVE ON" : "LIVE OFF";
  }
</script>

</body>

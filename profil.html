<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Profil – Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b0000;
  color:#fff;
}
.container{
  max-width:500px;
  margin:40px auto;
  background:#140000;
  border:2px solid red;
  border-radius:16px;
  padding:20px;
  box-shadow:0 0 20px rgba(255,0,0,.4);
}
.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  display:block;
  margin:0 auto;
  border:3px solid red;
}
h1{text-align:center}
.role{
  text-align:center;
  color:#4da6ff;
  font-weight:bold;
}
.block{
  margin-top:15px;
  background:rgba(255,255,255,.05);
  padding:12px;
  border-radius:10px;
}
.progress-bar{
  width:100%;
  height:12px;
  background:#300;
  border-radius:10px;
  overflow:hidden;
}
.progress{
  height:100%;
  background:red;
}
.badges span{
  display:inline-block;
  background:#900;
  padding:6px 10px;
  border-radius:20px;
  margin:4px;
  font-size:13px;
}
.logout{
  width:100%;
  margin-top:20px;
  padding:12px;
  background:red;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:16px;
}
</style>
</head>

<body>

<div class="container">
  <img id="avatar" class="avatar">
  <h1 id="username">Chargement…</h1>
  <div class="role" id="roleLabel"></div>

  <div class="block">
    <div id="level"></div>
    <div class="progress-bar"><div class="progress" id="progress"></div></div>
    <div id="progressText"></div>
  </div>

  <div class="block">
    <div id="points"></div>
  </div>

  <div class="block badges" id="badges"></div>

  <button class="logout" onclick="logout()">Se déconnecter</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
  apiKey:"TON_API_KEY",
  authDomain:"TON_PROJET.firebaseapp.com",
  projectId:"TON_PROJET"
};
firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

function levelFromPoints(p){return Math.floor(p/100)+1;}
function allBadges(){return ["🟢 Nouveau","🔵 Actif","🟠 Engagé","🔴 Vétéran","🟣 Élite","🟡 Légende"];}

auth.onAuthStateChanged(async user=>{
  if(!user){location.href="connexion.html";return;}

  const ref=db.collection("users").doc(user.uid);
  let snap=await ref.get();

  if(!snap.exists){
    await ref.set({
      username:"Utilisateur",
      email:user.email,
      avatar:"https://via.placeholder.com/120",
      points:0,
      role:"user",
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    snap=await ref.get();
  }

  const d=snap.data();
  const isStaff=["admin","developer","moderator"].includes(d.role);

  const level=isStaff?1000:levelFromPoints(d.points);
  const badges=isStaff?allBadges():allBadges().filter((_,i)=>level>=[1,10,50,100,500,1000][i]);
  const progress=isStaff?100:(d.points%100);

  document.getElementById("username").innerText=d.username;
  document.getElementById("avatar").src=d.avatar;
  document.getElementById("roleLabel").innerText=isStaff?✔ ${d.role.toUpperCase()}:"Membre";
  document.getElementById("level").innerText="Niveau "+level;
  document.getElementById("points").innerText=isStaff?"∞ Points":d.points+" points";
  document.getElementById("progress").style.width=progress+"%";
  document.getElementById("progressText").innerText=isStaff?"Progression max":"Vers niveau suivant";

  const b=document.getElementById("badges");
  b.innerHTML="";
  badges.forEach(x=>{
    const s=document.createElement("span");
    s.innerText=x;
    b.appendChild(s);
  });
});

function logout(){
  auth.signOut().then(()=>location.href="connexion.html");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Profil utilisateur</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff}
.container{max-width:800px;margin:30px auto;padding:20px}
.card{border:1px solid #ff2a2a;border-radius:16px;padding:20px;background:#141414}
.header{display:flex;gap:20px;align-items:center}
.avatar{width:100px;height:100px;border-radius:50%;background:#333}
.username{font-size:24px;color:#ff4a4a}
.bio{margin-top:10px;color:#ccc}
.videos iframe{width:100%;height:420px;margin-top:20px;border-radius:12px}
.badge{color:#4da6ff;font-weight:bold}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="header">
      <img id="avatar" class="avatar">
      <div>
        <div class="username" id="username">@pseudo</div>
        <div class="badge">✔ Compte membre</div>
      </div>
    </div>

    <div class="bio" id="bio"></div>

    <div class="videos" id="videos"></div>
  </div>
</div>

<script>
const profile = JSON.parse(localStorage.getItem("profile"));
if(!profile){
  document.body.innerHTML = "<p style='text-align:center;margin-top:50px'>Profil introuvable</p>";
}

document.getElementById("username").innerText = "@"+profile.pseudo;
document.getElementById("bio").innerText = profile.bio;
document.getElementById("avatar").src = profile.photo || "https://via.placeholder.com/100";

const videosDiv = document.getElementById("videos");
(profile.videos || []).forEach(v=>{
  videosDiv.innerHTML += <iframe src="${v}" frameborder="0" allowfullscreen></iframe>;
});
</script>

</body>
</html>

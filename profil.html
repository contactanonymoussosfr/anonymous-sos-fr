<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Profil</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f0f0f;
  color:#fff;
}

nav{
  background:#140000;
  padding:15px;
}

nav a{
  color:#ff4a4a;
  text-decoration:none;
  font-weight:bold;
  margin-right:15px;
}

.container{
  max-width:800px;
  margin:30px auto;
  padding:20px;
}

.card{
  background:#141414;
  border:1px solid #ff2a2a;
  border-radius:16px;
  padding:20px;
}

.header{
  display:flex;
  gap:20px;
  align-items:center;
}

.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  background:#333;
  object-fit:cover;
}

.username{
  font-size:24px;
  color:#ff4a4a;
}

.badge{
  color:#4da6ff;
  font-weight:bold;
}

.bio{
  margin-top:10px;
  color:#ccc;
}

.videos iframe{
  width:100%;
  height:420px;
  margin-top:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Accueil</a>
  <a href="profil.html">Mon profil</a>
  <a href="editer-profil.html">Modifier mon profil</a>
</nav>

<div class="container">
  <div class="card">

    <div class="header">
      <img id="avatar" class="avatar">
      <div>
        <div class="username" id="username">@pseudo</div>
        <div class="badge">✔ Compte membre</div>
      </div>
    </div>

    <div class="bio" id="bio"></div>
    <div class="videos" id="videos"></div>

  </div>
</div>

<script>
const profile = JSON.parse(localStorage.getItem("profile"));

if(!profile){
  document.body.innerHTML =
    "<p style='text-align:center;margin-top:50px'>Aucun profil trouvé</p>";
}

document.getElementById("username").innerText = "@" + profile.pseudo;
document.getElementById("bio").innerText = profile.bio || "";
document.getElementById("avatar").src =
  profile.photo || "https://via.placeholder.com/100";

const videosDiv = document.getElementById("videos");
(profile.videos || []).forEach(link=>{
  videosDiv.innerHTML +=
    <iframe src="${link}" frameborder="0" allowfullscreen></iframe>;
});
</script>

</body>
</html>

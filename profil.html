<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Profil – Anonymous SOS FR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0000;
  color:#fff;
}
.container{
  max-width:500px;
  margin:40px auto;
  background:#140000;
  border:2px solid red;
  border-radius:16px;
  padding:20px;
  box-shadow:0 0 20px rgba(255,0,0,.4);
}
.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  display:block;
  margin:0 auto;
  border:3px solid red;
  object-fit:cover;
}
h1{
  text-align:center;
  margin:15px 0 5px;
}
.badge-main{
  text-align:center;
  color:#4da6ff;
  font-weight:bold;
}
.block{
  margin-top:15px;
  background:rgba(255,255,255,.05);
  padding:12px;
  border-radius:10px;
}
.label{
  color:#ff6b6b;
  font-size:13px;
}
.value{
  font-size:18px;
}
.progress-bar{
  width:100%;
  height:12px;
  background:#300;
  border-radius:10px;
  overflow:hidden;
  margin-top:6px;
}
.progress{
  height:100%;
  background:red;
  width:0%;
}
.badges span{
  display:inline-block;
  background:#900;
  padding:6px 10px;
  border-radius:20px;
  margin:4px;
  font-size:13px;
}
.logout{
  width:100%;
  margin-top:20px;
  padding:12px;
  background:red;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <img id="avatar" class="avatar" src="https://via.placeholder.com/120">
  <h1 id="username">Chargement…</h1>
  <div class="badge-main" id="mainBadge"></div>

  <div class="block">
    <div class="label">Niveau</div>
    <div class="value" id="level"></div>
    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>
    <div class="label" id="progressText"></div>
  </div>

  <div class="block">
    <div class="label">Points</div>
    <div class="value" id="points"></div>
  </div>

  <div class="block">
    <div class="label">Badges obtenus</div>
    <div class="badges" id="badges"></div>
  </div>

  <button class="logout" onclick="logout()">Se déconnecter</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* 🔴 REMPLACE ICI PAR TES INFOS FIREBASE */
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_PROJET.firebaseapp.com",
  projectId: "TON_PROJET",
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* 🔢 LOGIQUE NIVEAUX */
function levelFromPoints(points){
  return Math.floor(points / 100) + 1;
}

function badgesFromLevel(level){
  const b=[];
  if(level>=1) b.push("🟢 Nouveau");
  if(level>=10) b.push("🔵 Actif");
  if(level>=50) b.push("🟠 Engagé");
  if(level>=100) b.push("🔴 Vétéran");
  if(level>=500) b.push("🟣 Élite");
  if(level>=1000) b.push("🟡 Légende");
  return b;
}

auth.onAuthStateChanged(async user=>{
  if(!user){
    window.location.href="connexion.html";
    return;
  }

  const ref=db.collection("users").doc(user.uid);
  const snap=await ref.get();

  if(!snap.exists){
    await ref.set({
      username:"Utilisateur",
      email:user.email,
      avatar:"https://via.placeholder.com/120",
      points:0,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  // +5 points à chaque connexion
  await ref.update({
    points: firebase.firestore.FieldValue.increment(5)
  });

  const data=(await ref.get()).data();
  const points=data.points||0;
  const level=levelFromPoints(points);
  const badges=badgesFromLevel(level);
  const progress=(points%100);

  document.getElementById("username").innerText=data.username;
  document.getElementById("avatar").src=data.avatar;
  document.getElementById("level").innerText="Niveau "+level;
  document.getElementById("points").innerText=points+" pts";
  document.getElementById("progress").style.width=progress+"%";
  document.getElementById("progressText").innerText=progress+" / 100 vers le niveau suivant";
  document.getElementById("mainBadge").innerText=badges[badges.length-1];

  const bDiv=document.getElementById("badges");
  bDiv.innerHTML="";
  badges.forEach(x=>{
    const s=document.createElement("span");
    s.innerText=x;
    bDiv.appendChild(s);
  });
});

function logout(){
  auth.signOut().then(()=>location.href="connexion.html");
}
</script>

</body>
</html>

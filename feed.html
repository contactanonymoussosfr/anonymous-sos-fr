<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Feed — Anonymous SOS FR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      background:#0b0b0b;
      color:#fff;
      font-family:Arial, sans-serif;
    }

    header{
      background:#8b0000;
      padding:12px;
      text-align:center;
      font-weight:bold;
      letter-spacing:1px;
    }

    .container{
      max-width:500px;
      margin:20px auto;
      padding:10px;
    }

    .post{
      background:#141414;
      border:1px solid #ff0000;
      border-radius:10px;
      padding:10px;
      margin-bottom:15px;
    }

    .username{
      font-weight:bold;
      color:#ff4444;
      margin-bottom:5px;
    }

    video, img{
      width:100%;
      max-height:420px;
      object-fit:cover;
      border-radius:8px;
      background:black;
    }

    .desc{
      font-size:14px;
      margin-top:6px;
    }

    .date{
      font-size:12px;
      opacity:.6;
      margin-top:4px;
    }

    .actions{
      display:flex;
      justify-content:space-around;
      margin-top:10px;
    }

    .btn{
      background:#8b0000;
      border:none;
      color:white;
      padding:6px 12px;
      border-radius:20px;
      cursor:pointer;
      font-size:13px;
    }

    .btn:hover{
      background:#ff0000;
    }
  </style>
</head>

<body>

<script>
  // 🔐 COMPTE OBLIGATOIRE
  const user = localStorage.getItem("currentUser");
  if(!user){
    window.location.href = "connexion.html";
  }
</script>

<header>
  📺 FEED — Anonymous SOS FR
</header>

<div class="container">

  <!-- POST 1 -->
  <div class="post">
    <div class="username">@anonymous_sos_fr</div>

    <video controls>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <div class="desc">Vidéo de test — système en cours de déploiement</div>
    <div class="date">Publié aujourd’hui</div>

    <div class="actions">
      <button class="btn">❤️ Like</button>
      <button class="btn">💬 Commenter</button>
      <button class="btn">🎁 Cadeau</button>
    </div>
  </div>

  <!-- POST 2 -->
  <div class="post">
    <div class="username">@membre_anon</div>

    <img src="https://picsum.photos/500/400" alt="image">

    <div class="desc">Publication image — visibilité réseau</div>
    <div class="date">Il y a 1 heure</div>

    <div class="actions">
      <button class="btn">❤️ Like</button>
      <button class="btn">💬 Commenter</button>
      <button class="btn">🎁 Cadeau</button>
    </div>
  </div>

</div>

</body>
</html>
